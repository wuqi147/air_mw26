<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<script type="text/javascript">
var tip = "";
var MAX_FILE_SIZE = (32 * 1024 - 1); /* 32K */
var XML_SEND_COMPLETE = 4;
var HTML_STATUS_OK = 200;
var e;
var cfgfile;
var _start = 0;
var _end = SLICE_SIZE;
var chunkNum = 0;
var S_E_UPLOAD = 1;
var S_E_CRCERROR = 3;
var S_E_WRITE_ERROR = 5;
var upStatus = S_E_CRCERROR;
function docW(a)
{
    document.write(a)
}
function $id(a)
{
    return document.getElementById(a)
}
function chkConfigFile()
{
    e = $id("path").value;
    if ("" == e) return alert(js_choose_file = parent.window.syscfg_info.cfm_info0), !1;
    if (MAX_FILE_SIZE < cfgfile.size)
    {
        alert(parent.window.syscfg_info.alt_info0);
        return false;
    }
    var i;
    return /\.json$/.test(e) ? 63 < e.length ? (alert(js_bad_file = parent.window.syscfg_info.alt_info0), (i = $id("filename"))
            .focus(), i.select(), !1) : !!confirm(js_confirm_download = parent.window.syscfg_info.cfm_info1) : (alert(js_bad_file = parent.window.syscfg_info.cfm_info2),
            (i = $id("filename")).focus(), i.select(), !1)
}
function uploadCbk()
{
    if(XML_SEND_COMPLETE == xmlreq.readyState)
    {
        if (HTML_STATUS_OK == xmlreq.status)
        {
            upStatus = Number(xmlreq.responseText);
            if(S_E_UPLOAD == upStatus)
            {
                chunkNum++;
                _start = _end;
                _end = _start + SLICE_SIZE;
                sendChunk();
                return;
            }
            else if(S_E_CRCERROR == upStatus)
            {
                alert(parent.window.syscfg_info.err_file);
            }
            else if(S_E_WRITE_ERROR == upStatus)
            {
                alert(parent.window.syscfg_info.err_write);
            }
            else
            {
                alert(parent.window.syscfg_info.err_success);
            }
            parent.window.doUpgarde = false;
            chunkNum = 0;
            _start = 0;
            _end = SLICE_SIZE;
        }
    }
}

function sendChunk()
{
    var chunk = 0;
    var suri;

    if(_start < cfgfile.size)
    {
        if(cfgfile.mozSlice)
        {
            chunk = cfgfile.mozSlice(_start, _end);
        }
        else if(cfgfile.webkitSlice)
        {
            chunk = cfgfile.webkitSlice(_start, _end);
        }
        else
        {
            chunk = cfgfile.slice(_start, _end);
        }
        if(_end < cfgfile.size)
        {
            suri = "/conf_restore.cgi?id=" + chunkNum;
        }
        else
        {
            suri = "/conf_restore.cgi?id=End";
        }

        var formdata = new FormData();
        formdata.append("file-data", chunk);
        xmlreq = parent.getXMLObject();
        xmlreq.open("POST", suri, true);
        if(0 == chunkNum)
        {
            xmlreq.setRequestHeader("File-Size", cfgfile.size);
        }
        xmlreq.onreadystatechange = uploadCbk;
        xmlreq.send(formdata);
    }
}
function doRestore()
{
    var KEY_ENTER_EVENT = 13;

    if((event.keyCode == KEY_ENTER_EVENT) || (S_E_UPLOAD == upStatus))
    {
        return false;
    }
    if("" == $id("filename").value)
    {
        alert(parent.window.fwupdate_info.err_file);
        return false;
    }
    cfgfile = $id("filename").files[0];
    try
    {
        if (true == chkConfigFile())
        {
            parent.window.doUpgarde = true;
            sendChunk();
        }
    }
    catch (e)
    {
        (document.restore.submit(), disableAll())
    }
    return true;
}
function disableAll()
{
    document.backup.btnBackup.disabled = !0, $id("btnRestore").disabled = !0, document.restore.configfile.disabled = !0
}
function showfilename()
{
    $id("path").value = $id("filename").value.replace(/[^\\\/]*[\\\/]+/g, "");
}
window.onload = function () {
   $id("btnBackup").value = parent.window.syscfg_info.btn_bcakup;
   $id("filename").onchange = () => { showfilename(); };
   $id("path").value = parent.window.syscfg_info.path_info;
   $id("btnSelect").onclick = () => { $id("filename").click(); };
   $id("btnSelect").value = parent.window.syscfg_info.path_info1;
   $id("btnRestore").onclick = () => { doRestore(); };
   $id("btnRestore").value = parent.window.syscfg_info.spn_cfgrestore;
}
</script>
