<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<script type="text/javascript">
var voiceCnt = voiceinfo_ds.voiceOuiCount, voiceVid = voiceinfo.vid, voicePri = voiceinfo.pri;
var portstruct = [];
function docW(a) {
  document.write(a);
}
function $id(a) {
  return document.getElementById(a);
}
function portArrToBmp(arr) {
  var pbm = 0;
  for (var port = 0; port < portMaxNum; port++) {
    if (1 == arr[port]) {
      pbm |= (1 << port);
    }
  }
  return pbm;
}
function portBmpToArr(bmp) {
  var arr = [];
  for (var port = 0; port < portMaxNum; port++) {
    if (bmp & (1 << (port))) {
      arr.push(1);
    }
    else {
      arr.push(0);
    }
  }
  return arr;
}
function syncOUI() {
  if($id("default_desc").value == "3com")
    $id("default_oui").value = "00:E0:BB";
  else if($id("default_desc").value == "cisco")
    $id("default_oui").value = "00:03:6B";
  else if($id("default_desc").value == "veritel")
    $id("default_oui").value = "00:E0:75";
  else if($id("default_desc").value == "pingtel")
    $id("default_oui").value = "00:D0:1E";
  else if($id("default_desc").value == "siemens")
    $id("default_oui").value = "00:01:E3";
  else if($id("default_desc").value == "necphilips")
    $id("default_oui").value = "00:60:B9";
  else if($id("default_desc").value == "huawei3com")
    $id("default_oui").value = "00:0F:E2";
  else if($id("default_desc").value == "avaya")
    $id("default_oui").value = "00:09:6E";
}
function showOuiCfg() {
  if ($id("default_en").checked == true) {
    $id("default_oui").disabled = false;
    $id("default_desc").disabled = false;
    $id("custom_desc").disabled = true;
    $id("custom_oui").disabled = true;
  }
  else if ($id("custom_en").checked == true) {
    $id("default_oui").disabled = true;
    $id("default_desc").disabled = true;
    $id("custom_desc").disabled = false;
    $id("custom_oui").disabled = false;
  }
}

function portCfgStruct(id_name, idx, selenable, portmode, secmode, state) {
  this.idx = idx + 1;
  this.id_name = id_name + this.idx;
  this.selenable = selenable;
  this.portmode = portmode;
  this.secmode = secmode;
  this.memberstate = state;
  return this;
}
function initPortCfg() {
  var portModes = portBmpToArr(voiceinfo.portmode);
  var voiceMemberState = portBmpToArr(memberstate);
  var secModes;
  var i=0, port=0;

  if (secshow == true) {
    secModes = portBmpToArr(voiceinfo.secmode);
  }
  else {
    secModes = portBmpToArr(0);
  }
  for (port = 0; port < portMaxNum; port++) {
    var selenable = false;
    if (0 != trunk_conf.count) {
      for (i = 0; i < trunk_conf.maxTrunkNum; i++) {
        if (0 == trunk_conf.info[i].valid) {
          continue;
        }
        if (trunk_conf.info[i].mbrs & (1 << (port)))
        {
          selenable = true;
          break;
        }
      }
    }
    portstruct.push(new portCfgStruct("voice_port_", port, selenable, portModes[port], secModes[port], voiceMemberState[port]));
  }
  if (0 != trunk_conf.count) {
    for (i = 0; i < trunk_conf.maxTrunkNum; i++) {
      if (0 == trunk_conf.info[i].valid) {
        continue;
      }
      for (port = 0; port < portMaxNum; port++) {
        if (trunk_conf.info[i].mbrs & (1 << (port))) {
          break;
        }
      }
      portstruct.push(new portCfgStruct("voice_trunk_", i, false, portModes[port], secModes[port], voiceMemberState[port]));
    }
  }
}
function showPortCfg() {
  var portArrNum = portMaxNum + trunk_conf.count;
  var tr_str = `
    <table class=BORDER><tbody>
      <tr class=TABLE_HEAD>
        <td class=TD_FIRST_COL><span class=NORMAL>${parent.window.vlan_8021q_info.td_select}</span></td>
        <td class=TD_FIRST_COL><span class=NORMAL>${parent.window.str_info.td_port}</span></td>
        <td class=TD_FIRST_COL><span class=NORMAL>${parent.window.voice_info.td_portMode}</span></td>
  `;
  if (secshow == true) {
    tr_str += `
        <td class=TD_FIRST_COL><span class=NORMAL>${parent.window.voice_info.td_securityMode}</span></td>
    `;
  }
  tr_str += `
        <td class=TD_FIRST_COL><span class=NORMAL>${parent.window.voice_info.td_memberState}</span></td>
      </tr>
      <tr class=TABLE_HEAD>
        <td class=TD_FIRST_COL><input class=CHKBOX_NORMAL type=checkbox id=selAllVoicePorts name=selAllVoicePorts></td>
        <td class=TD_FIRST_COL></td>
        <td class=TD_FIRST_COL>
          <select id=voice_portmode_sel name=voice_portmode_sel class=SELECT_NORMAL>
            <option value=0>${parent.window.voice_info.opt_manualMode}</option>
            <option value=1>${parent.window.voice_info.opt_autoMode}</option>
          </select>
        </td>
  `;
  if (secshow == true) {
    tr_str += `
        <td class=TD_FIRST_COL>
          <select id=voice_secmode_sel name=voice_secmode_sel class=SELECT_NORMAL>
            <option value=0>${parent.window.str_info.opt_disable}</option>
            <option value=1>${parent.window.str_info.opt_enable}</option>
          </select>
        </td>
    `;
  }
  tr_str += `
        <td class="TD_FIRST_COL"><a class="BTN1">
          <input type=button value=${parent.window.str_info.btn_apply} id="btn_apply" class="BTN_NORMAL_BTN FIX_W">
        </a></td>
      </tr>
  `;
  for (var i = 1; i <= portArrNum; i++) {
    var name = (i > portMaxNum) ? parent.window.trunk_info.opt_trunk : parent.window.str_info.td_port;
    var mode = portstruct[i - 1].portmode ? parent.window.voice_info.opt_autoMode : parent.window.voice_info.opt_manualMode;
    var state = portstruct[i - 1].memberstate ? parent.window.voice_info.opt_active : parent.window.voice_info.opt_Inactive;
    tr_str += `
        <tr>
        <td><input class=CHKBOX_NORMAL type=checkbox name=${portstruct[i - 1].id_name} id=${portstruct[i - 1].id_name} value=1></td>
        <td><span class=NORMAL>${name}${portstruct[i - 1].idx}</span></td>
        <td><span class=NORMAL>${mode}</span></td>
    `;
    if (secshow == true) {
      var secmode = portstruct[i - 1].secmode ? parent.window.str_info.opt_enable : parent.window.str_info.opt_disable;
      tr_str += `
        <td><span class=NORMAL>${secmode}</span></td>
      `;
    }
    tr_str += `
        <td><span class=NORMAL>${state}</span></td>
        </tr>
    `;
  }
  tr_str += "</tbody></table>";
  $id("voice_portset").innerHTML = tr_str;
  $id("selAllVoicePorts").onclick = () => selVoicePortAll();
  $id("btn_apply").onclick = () => doPortCfgApply();
  for (var i = 1; i <= portArrNum; i++) {
    $id(portstruct[i - 1].id_name).onClick = () => selVoiceTrunkMbrsByFlag(i.toString());
  }  
}

function disablePortSelect() {
  for (var i = 0; i < portMaxNum; i++) {
    $id(portstruct[i].id_name).disabled = portstruct[i].selenable;
  }
}

function initVoice() {
  if (vlanState != 2) {
    alert(parent.window.voice_info.alt_info1); /* "Please enable 802.1Q VLAN first." */
    $id("vlan_sel").disabled = true;
    $id("priority_sel").disabled = true;
    $id("voice_en").checked = false;
    $id("ouicfg").style.display = "none";
    $id("portcfg").style.display = "none";
    return;
  }

  if (voiceinfo.state == 0) { /* disable */
    $id("vlan_sel").disabled = true;
    $id("priority_sel").disabled = true;
    $id("voice_en").checked = false;
    $id("ouicfg").style.display = "none";
    $id("portcfg").style.display = "none";
  }
  else { /* enable */
    $id("vlan_sel").disabled = false;
    $id("priority_sel").disabled = false;
    $id("voice_en").checked = true;
    $id("ouicfg").style.display = "";
    $id("portcfg").style.display = "";
    if (voiceVid != 0) {
      $id("vlan_sel").value = voiceVid;
      $id("priority_sel").value = voicePri;
    }
  }
  syncOUI();
  showOuiCfg();
  initPortCfg();
  showPortCfg();
  disablePortSelect();
}

function chkVlanRange(val, min, max) {
  var input_vid = (typeof val == 'string')? Number(val) : val;
  if (min <= input_vid && input_vid <= max) {
    return true;
  }
  return false;
}

function doVoiceApply() {
  var input_state = ($id("voice_en").checked == true)? 1 : 0;
  var input_vid = Number($id("vlan_sel").value);
  var input_pri = Number($id("priority_sel").value);

  if ((2 != vlanState) && (1 == input_state)) {
    alert(parent.window.voice_info.alt_info1);
    return;
  }

  if ((1 != qosMode) && (1 == input_state))
  {
    alert(parent.window.voice_info.alt_info9);
    return;
  }

  if (input_state != voiceinfo.state) {
    return location.href = "voicevlanSet.cgi?state=" + input_state + "&vid=" + voiceVid + "&pri=" + voicePri;
  }

  if (1 == input_state) {
    if ((input_vid != voiceVid) || (input_pri != voicePri)) {
      if (false == chkVlanRange($id("vlan_sel").value, 2, 4094)) {
        alert(parent.window.voice_info.alt_info0); /* "The entered vid is invalid." */
        return;
      }
      if (1 == input_vid) {
        alert(parent.window.voice_info.alt_info6);
        return;
      }
      return location.href = "voicevlanSet.cgi?state="+ input_state + "&vid=" + input_vid + "&pri=" + input_pri;
    }
  }
}

function chkMacRegex(mac) {
  var regexMac = /^([0-9A-F]{2}[:]){2}([0-9A-F]{2})$/i;
  return regexMac.test(mac);
}

function chkDescRegex(desc) {
  var regexDesc = /^([0-9A-Z_=-]{0,10})$/i;
  return regexDesc.test(desc);
}

function findOuiTblFirstEmptyIdx() {
  var i, j, count = 0;

  for (i = 1; i <= ouiEntryMaxLimit; i++) {
    for (j = 0; j < voiceinfo_ds.voiceOuiCount; j++) {
      if (voiceinfo_ds.oui_info[j].index != i) {
        count++;
      }
    }
    for (j = 0; j < surveilinfo_ds.surveilOuiCount; j++) {
      if (surveilinfo_ds.oui_info[j].index != i) {
        count++;
      }
    }

    if (count == (voiceinfo_ds.voiceOuiCount + surveilinfo_ds.surveilOuiCount)) {
      return i;
    }
    else {
      count = 0;
    }
  }
}

function addOui() {
  var input_oui = "", input_desr = "", convert_oui = "";

  if ($id("vlan_sel").value == '') {
    alert(parent.window.voice_info.alt_info0);
    return;
  }

  if ((voiceinfo_ds.voiceOuiCount + surveilinfo_ds.surveilOuiCount) >= ouiEntryMaxLimit) {
    alert(parent.window.voice_info.alt_info2); /* OUI has reached the upper limit of 16 and cannot be added anymore. */
    return;
  }

  if ($id("default_en").checked == true) {
    input_oui = $id("default_oui").value;
    input_desr = $id("default_desc").value;
  }
  else if ($id("custom_en").checked == true) {
    input_oui = $id("custom_oui").value;
    input_desr = $id("custom_desc").value;
  }

  if (false == chkMacRegex(input_oui)) {
    alert(parent.window.voice_info.alt_info3); /* "The OUI format is incorrect, the correct format is 00:AA:BB." */
    return;
  }

  if (false == chkDescRegex(input_desr)) {
    alert(parent.window.voice_info.alt_info7); /* "The OUI description cotains illegal characters. Legal characters are: letters, numbers, dash(-), underscore(_) and equal sign(=)." */
    return;
  }

  convert_oui = input_oui.replace(/:/g, '').toUpperCase();

  for (var i = 0; i < voiceinfo_ds.voiceOuiCount; i++) {
    if (input_oui.toUpperCase() == voiceinfo_ds.oui_info[i].oui.toUpperCase()) {
      alert(parent.window.voice_info.alt_info4); /* "The same OUI already exists."; */
      return;
    }
  }

  for (var i = 0; i < surveilinfo_ds.surveilOuiCount; i++) {
    if (input_oui.toUpperCase() == surveilinfo_ds.oui_info[i].oui.toUpperCase()) {
      alert(parent.window.voice_info.alt_info4); /* "The same OUI already exists."; */
      return;
    }
  }
  return location.href = "voiceOuiSet.cgi?idx=" + findOuiTblFirstEmptyIdx() + "&oui=" + convert_oui + "&descr=" + input_desr;
}

function delOui() {
  var oui_bmp = 0, count = 0;
  var oui_info = voiceinfo_ds.oui_info;

  for (var i = 0; i < voiceCnt; i++) {
    if (true == $id("oui_" + i).checked) {
      oui_bmp |= (1 << (oui_info[i].index - 1)); /* NOTE: index need used 1-based */
      count++;
    }
  }

  if (0 == count) {
    alert(parent.window.voice_info.alt_info5); /* "Please select the OUI to be deleted first." */
    return;
  }
  return location.href = "voiceOuiDel.cgi?oui_bmp=" + oui_bmp + "&count=" + count;
}

function selVoiceTrunkMbrsByFlag(p_idx) {
 var i, flag, count = 0, idx = +p_idx;

 if (idx > portMaxNum) {
  var trunk_idx = portstruct[idx-1].idx - 1;
  flag = $id(portstruct[idx-1].id_name).checked;
  for (var port = 0; port < portMaxNum; port++) {
   if (trunk_conf.info[trunk_idx].mbrs & (1 << (port))) {
    $id(portstruct[port].id_name).checked = flag;
   }
  }
 }
 for (i = 0; i < portMaxNum; i++) {
  if ($id(portstruct[i].id_name).checked == true) {
   count++;
  }
 }
 flag = (count == portMaxNum)? true : false;
 $id("selAllVoicePorts").checked = flag;
}

function selVoicePortAll() {
 var i =0;
 var portArrNum = portMaxNum + trunk_conf.count;
 var checked = (true === $id("selAllVoicePorts").checked)? true : false;
 for (i = 0; i < portArrNum; i++) {
  $id(portstruct[i].id_name).checked = checked;
 }
}

function getVoicePortSelBmp()
{
    var portBitmap = 0;
    var i = 0;
    var portArrNum = portMaxNum + trunk_conf.count;

    for (i = 0; i < portArrNum; i++)
    {
        let idx = portstruct[i].id_name.indexOf("trunk");
        if (idx <=0 && true == $id(portstruct[i].id_name).checked)
        {
            portBitmap |= (1<<i);
        }
    }
    return portBitmap;
}

function doPortCfgApply() {
  var count = 0;
  var portModes = portBmpToArr(voiceinfo.portmode);
  var input_mode = Number($id("voice_portmode_sel").value);
  var in_portmode = 0;
  var secModes;
  var input_secmode = 0, in_secmode = 0, org_secmode = 0;
  if (secshow === true) {
    secModes = portBmpToArr(voiceinfo.secmode);
    input_secmode = Number($id("voice_secmode_sel").value);
  }
  else {
    secModes = portBmpToArr(0);
  }

  for(var port = 0; port < portMaxNum; port++) {
   if ($id(portstruct[port].id_name).checked === true) {
    portModes[port] = input_mode;
    secModes[port] = input_secmode;
    count++;
   }
  }

  if (0 === count) {
    alert(parent.window.voice_info.alt_info8); /* "Please select the ports to be configured first." */
    return;
  }
  in_portmode = portArrToBmp(portModes);

  if (secshow === true) {
    org_secmode = voiceinfo.secmode;
    in_secmode = portArrToBmp(secModes);
  }
  if ((in_portmode != voiceinfo.portmode) || (in_secmode != org_secmode)) {
    var reqstr = "voicePortSet.cgi?portmode=" + in_portmode;
    if (secshow === true) {
      reqstr += "&secmode=" + in_secmode;
    }
    reqstr += "&portBitmap="+ getVoicePortSelBmp();
    return location.href = reqstr + "&trunkBitMap=" + parent.window.g_getTrunkBitMap(_trunk_info);
  }
}
function onlyNum(e) {
  e.target.value = e.target.value.replace(/\D/g,'');
}
window.onload = () => {
  $id("ouicfg").style.display = "none";
  $id("portcfg").style.display = "none";
  initVoice();
  $id("vlan_sel").oninput = (e) => onlyNum(e);
  $id("btn_mode").value = parent.window.str_info.btn_apply;
  $id("btn_mode").onclick = () => doVoiceApply();
  $id("default_en").onclick = () => showOuiCfg();
  $id("custom_en").onclick = () => showOuiCfg();
  $id("default_desc").onclick = () => syncOUI();
  $id("btn_add").value = parent.window.vlan_common_info.btn_add;
  $id("btn_add").onclick = () => addOui();
  $id("btn_del").value = parent.window.vlan_common_info.btn_del;
  $id("btn_del").onclick = () => delOui();
};
</script>
