function chkinput(input)
{
    if("" == input)
    {
        /* Empty input */
        return 2;

    }
    else if (input.match(/^(\d{1,3}\.){3}\d{1,3}$/))
    {
        let parts = input.split(".");
        for (let i = 0; i < parts.length; i++)
        {
            if (parseInt(parts[i]) > 255)
            {
                /* Invalid ip addr */
                return 1;
                break;
            }
        }
        /* Valid IP except zero network, 127.X.X.X, multicast/local bcast */
        if((0 == Number(parts[0])) ||
           (127 == Number(parts[0])) ||
           ((224 <= Number(parts[0]))) && (239 >= Number(parts[0])) ||
           ((255 == Number(parts[0])) && (Number(parts[1]) == Number(parts[0])) && (Number(parts[2]) == Number(parts[1])) && (Number(parts[3]) == Number(parts[2]))))
        {
            return 1;
        }
        /* Valid IPv4 address */
        return 0;
    }
    else
    {
        /* Invalid input */
        return 3;
    }
}

function appendString(igmp_snp_cfg)
{
    if(true == igmp_snp_cfg.fchange)
    {
        if (1 == $id("fastleaveEn").checked)
        {
            urlString += "&fastleave_mode=1";
        }
        else
        {
            urlString += "&fastleave_mode=0";
        }
    }
    if(true == igmp_snp_cfg.rchange)
    {
        if (1 == $id("reportSuEn").checked)
        {
            urlString += "&reportSu_mode=1";
        }
        else
        {
            urlString += "&reportSu_mode=0";
        }
    }

    /* IGMP SNP Querier */
    if("undefined" != typeof(igmp_ds.querierState))
    {
        if(true == igmp_snp_cfg.qchange)
        {
            if (1 == $id("igmpQuerEn").checked)
            {
                urlString += "&querier_mode=1";
            }
            else
            {
                urlString += "&querier_mode=0";
            }
        }
        if(true == igmp_snp_cfg.qechange)
        {
            if (1 == $id("igmpQuerElectEn").checked)
            {
                urlString += "&querier_elect=1";
            }
            else
            {
                urlString += "&querier_elect=0";
            }
        }
        if(("undefined" != typeof(igmp_ds.querierVer)) && (true == igmp_snp_cfg.qvchange))
        {
            if (1 == $id("querVer3").checked)
            {
                urlString += "&querier_ver=0";
            }
            else
            {
                urlString += "&querier_ver=1";
            }
        }
        if(true == igmp_snp_cfg.qachange)
        {
            let rc = 0;
            rc = chkinput($id("querAddr").value);
            if(0 == rc)
            {
                /* Valid ip addr */
                urlString += ("&querier_addr=" + $id("querAddr").value);
            }
            else if(2 == rc)
            {
                /* Empty input */
                let default_addr = "192.168.0.200";
                urlString += "&querier_addr=" + default_addr;
                default_addr = "(" + default_addr + ") ";
                return confirm(parent.window.igmp_info.alt_emptyaddress + "\n" + parent.window.igmp_info.alt_defaultaddress + default_addr + parent.window.igmp_info.alt_willbeuse + "" + "\n" + parent.window.igmp_info.alt_iscontinue,
                        parent.window.igmp_info.btn_confirm,
                        parent.window.igmp_info.btn_cancel);
            }
            else
            {
                /* Invalid ip addr */
                alert(parent.window.igmp_info.alt_invalidaddress);
                return false;
            }
        }
    }
    return true;
}

function igmp_reset()
{
    if(1 == $id("igmpDis").checked)
    {
        if(1 == $id("fastleaveEn").checked)
        {
            urlString += "&fastleave_mode=0";
        }
        if(1 == $id("reportSuEn").checked)
        {
            urlString += "&reportSu_mode=0";
        }
        return location.href = "igmpSnooping.cgi?igmp_mode=0" + urlString;
    }
    if($id("fastleaveEn").checked != igmp_ds.fastleaveState)
    {
        igmp_snp_cfg.fchange = true;
    }
    if($id("reportSuEn").checked != igmp_ds.suppressionState)
    {
        igmp_snp_cfg.rchange = true;
    }

    /* IGMP SNP Querier */
    if("undefined" != typeof(igmp_ds.querierState))
    {
        urlString += "&vlan_id=" + $id("igmpQuerVlan_Select").value;
        /* Check state */
        if($id("igmpQuerEn").checked != !!igmp_ds.querierState[cur_slect_idx])
        {
            igmp_snp_cfg.qchange = true;
        }
        /* Check election */
        if(($id("igmpQuerElectEn").checked != !!igmp_ds.querierElect[cur_slect_idx]) || (true == $id("igmpQuerElectDis").checked))
        {
            igmp_snp_cfg.qechange = true;
        }
        /* Check version */
        if(("undefined" != typeof(igmp_ds.querierVer)) && ($id("querVer2").checked != !!igmp_ds.querierVer[cur_slect_idx]))
        {
            igmp_snp_cfg.qvchange = true;
        }
        /* Check address */
        if("" == $id("querAddr").value)
        {
            if(true == $id("igmpQuerEn").checked)
            {
                igmp_snp_cfg.qachange = true;
            }
        }
        else
        {
            if((("undefined" != typeof(igmp_ds.querierAddr[cur_slect_idx])) && ($id("querAddr").value != igmp_ds.querierAddr[cur_slect_idx])) ||
                ("undefined" == typeof(igmp_ds.querierAddr[cur_slect_idx])))
            {
                igmp_snp_cfg.qachange = true;
            }
        }
    }

    if(true == appendString(igmp_snp_cfg))
    {
        return location.href = "igmpSnooping.cgi?igmp_mode=1" + urlString;
    }
    return;
}
var IgmpUtil = {
    ipToStr: function (i) {
    var s, t = parseInt(i, 16);
    return s = (4278190080 & t) >>> 24, s += ".", s += (16711680 & t) >>> 16, s += ".", s += (65280 &
        t) >>> 8, s += ".", s += 255 & t
    },
    pbmToStr: function (i) {
    for (var s = "", t = parseInt(i, 16), n = 0, r = 1; r <= _trunk_info.length; ++r)
    {
        if ((t & 1 << r) && (0 == _trunk_info[r-1])) {
            for (s += (r), n = r; t & 1 << r + 1;)
            {
                if(0 != _trunk_info[r])
                    break;
                r++;
            }
            n != r && (s += "-" + (r)), s += ","
        }
    }
    if("," == s.charAt(s.length - 1))
        s = s.substr(0, s.length - 1)
    for(let [key, value] of _port_list.entries())
    {
        if(-1 != key.indexOf("Trunk"))
        {
            if(value & (t >> 1))
            {
                if(s.length)
                    s += ",";
                s += key.replace("Trunk", parent.window.trunk_info.opt_trunk);

            }
        }
    }
    return s
    }
}

function state_change()
{
    let i;
    let data;
    let entry_str, group_entry;
    let start_index;
    let per_req_cnt;
    let return_cnt;
    /*  expected xml string
    *  0;
    *  16;
    *  01-00-5e-00-0e-6d,0x2&
    *  01-00-5e-00-0e-6f,0x4&
    *  01-00-5e-00-0e-6a,0x2&
    *  01-00-5e-00-0e-6b,0x4&
    *  01-00-5e-00-0e-6c,0x2&;
    *  5
    */

    if((XML_SEND_COMPLETE == xmlReq.readyState) && (HTML_STATUS_OK == xmlReq.status))
    {
        data = xmlReq.responseText.split(";");
        start_index = Number(data[0]);
        per_req_cnt = Number(data[1]);
        entry_str = (("" == data[2]) ? [] : data[2].split("&"));
        return_cnt = Number(data[(data.length - 1)]);

        if((0 != entry_str.length) && (0 != return_cnt))
        {
            for(i = 0; i < (entry_str.length - 1); i++)
            {
                index = start_index + i;
                group_entry = entry_str[i].split(",");
                $id("gentry_" + index).style.display = "table-row";
                if(1 == igmp_ds.searchmacTab)
                {
                    /* igmp search MAC table */
                    document.getElementById("addr_" + index).innerHTML = group_entry[0];
                }
                else
                {
                    /* igmp search IPMC table */
                    document.getElementById("addr_" + index).innerHTML = IgmpUtil.ipToStr(group_entry[0]);
                }
                document.getElementById("vid_" + index).innerHTML = group_entry[1];
                document.getElementById("port_" + index).innerHTML = IgmpUtil.pbmToStr(group_entry[2]);
            }
        }

        /* Make sure have not missed any group entry */
        if((start_index + per_req_cnt) >= igmp_ds.count)
        {
            /* Get querier info */
            querierState();
            setTimeout(igmpQuerierCheckvid, (500));
        }
        else
        {
            l2mcState();
        }
    }
}

function querier_state_change()
{
    let data;
    let querier_str, querier_entry;
    let start_index;
    let per_req_cnt;
    let return_cnt;
    let vid, state, elect, ver, addr = "";

    var ret;
    let i, index = 0;
    /*  expected xml string
     *  0;
     *  16;
     *  1,0,1,0,192.168.0.200&
     *  3,1,1,1,192.168.0.201&
     *  4,1,0,0,192.168.0.202&
     *  6,2,1,0,192.168.0.203&
     *  7,1,0,1,0.0.0.0&;
     *  5
     */
    if((XML_SEND_COMPLETE == xmlReq.readyState) && (HTML_STATUS_OK == xmlReq.status))
    {
        if("" == xmlReq.responseText)
        {
            return;
        }
        data = xmlReq.responseText.split(";");
        start_index = Number(data[0]);
        per_req_cnt = Number(data[1]);
        querier_str = (("" == data[2]) ? [] : data[2].split("&"));
        return_cnt = Number(data[(data.length - 1)]);

        if((0 != querier_str.length) && (0 != return_cnt))
        {
            for(i = 0; i < (querier_str.length - 1); i++)
            {
                index = start_index + i;
                querier_entry = querier_str[i].split(",");
                /* update igmp_snp querier entry info */
                igmp_ds.vids[index] = vid = Number(querier_entry[0]);
                igmp_ds.querierState[index] = state = Number(querier_entry[1]);
                igmp_ds.querierElect[index] = elect =  Number(querier_entry[2]);
                if("undefined" != typeof(igmp_ds.querierVer))
                {
                    igmp_ds.querierVer[index] = ver = Number(querier_entry[3]);
                }
                else
                {
                    ver = 1;
                }
                igmp_ds.querierAddr[index] = addr = querier_entry[4];

                $id("qentry_" + index).style.display = "table-row";
                $id("qvid_" + index).innerHTML = vid;
                $id("qstate_" + index).innerHTML = querier_strinfo[state];
                $id("qelect_" + index).innerHTML = state_strinfo[elect];
                $id("qver_" + index).innerHTML = version_strinfo[ver];
                if(0 == chkinput(addr))
                {
                    $id("qaddr_" + index).innerHTML = addr;
                }
                else
                {
                    $id("qaddr_" + index).innerHTML = "---";
                    igmp_ds.querierAddr[index] = "";
                }

            }
        }

        if((start_index + return_cnt) < igmp_ds.vlan_count)
        {
            querierState();
        }
        else
        {
            setTimeout(querierState, (10 * 1000));
        }
    }
    return;
}

function igmpRouterInit()
{
    for(let [key, value] of _port_list.entries())
    {
        $id("static_"+key).checked = false;
        $id("dynamic_"+key).checked = false;
        $id("dynamic_"+key).disabled = true;
        if(0 != (Number(value) & Number(igmp_ds.rstic)))
        {
            $id("static_"+key).checked = true;
        }
        else if((0 != (Number(value) & Number(igmp_ds.rdyna))) && (0 != igmp_ds.state))
        {
            $id("dynamic_"+key).checked = true;
        }
    }
}
function igmp_router()
{
    var portmap = 0;
    for(let [key, value] of _port_list.entries())
    {
        if($id("static_"+key).checked == true)
        {
            portmap |= Number(value);
        }
    }
    return location.href = "igmpSnooping.cgi?mrouter=" + portmap + "&trunkBitMap=" + parent.window.g_getTrunkBitMap(_trunk_info);
}

    $id("fastleaveDis").onclick = () => { return igmp_change(); };

    $id("reportSuEn").onclick = () => { return igmp_change(); };
    $id("reportSuDis").onclick = () => { return igmp_change(); };
    igmpReportMsgSuppressionInit();
    $id("igmpQuerVlan_Select").onclick = () => { return igmpQuerierCheckvid(); };
    igmpQuerierVlanInit();
    $id("igmpQuerEn").onclick = () => { return igmpQuerierchange(); };
    $id("igmpQuerDis").onclick = () => { return igmpQuerierchange(); };
    igmpQuerierStateInit();
    $id("igmpQuerElectEn").onclick = () => { return igmpQuerierchange(); };
    $id("igmpQuerElectDis").onclick = () => { return igmpQuerierchange(); };
    igmpQuerierElectInit();
    $id("querVer2").onclick = () => { return igmpQuerierchange(); };
    $id("querVer3").onclick = () => { return igmpQuerierchange(); };
    igmpquerierVersionInit();
    $id("querAddr").onkeyup = (e) => { e.target.value = e.target.value; };
    $id("querAddr").onafterpaste = (e) => { e.target.value = e.target.value; };
    igmpquerierAddrInit();
    $id("igsn_apply").onclick = () => { return igmp_reset(); };
    $id("igsn_apply").value = parent.window.str_info.btn_apply;
    $id("router_apply").onclick = () => { return igmp_router(); };
    $id("router_apply").value = parent.window.str_info.btn_apply;
    igmpRouterInit();
    initIgmpSnooping()

    if(igmp_ds.count)
    {
        l2mcState();
    }
    else
    {
        /* Get querier info */
        querierState();
        setTimeout(igmpQuerierCheckvid, (500));
    }
}
</script>
