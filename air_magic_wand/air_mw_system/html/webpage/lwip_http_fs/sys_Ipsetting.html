function ip6Verify(r)
{
    var value = String(r.value).trim();

    var ipv6_reg = new RegExp(
        '^(?:' +
        '([0-9A-Fa-f]{1,4}:){7}[0-9A-Fa-f]{1,4}' +
        '|(([0-9A-Fa-f]{1,4}:){1,7}:)' +
        '|(([0-9A-Fa-f]{1,4}:){1,6}:[0-9A-Fa-f]{1,4})' +
        '|(([0-9A-Fa-f]{1,4}:){1,5}(:[0-9A-Fa-f]{1,4}){1,2})' +
        '|(([0-9A-Fa-f]{1,4}:){1,4}(:[0-9A-Fa-f]{1,4}){1,3})' +
        '|(([0-9A-Fa-f]{1,4}:){1,3}(:[0-9A-Fa-f]{1,4}){1,4})' +
        '|(([0-9A-Fa-f]{1,4}:){1,2}(:[0-9A-Fa-f]{1,4}){1,5})' +
        '|(([0-9A-Fa-f]{1,4}:){1}(:[0-9A-Fa-f]{1,4}){1,6})' +
        '|:((:[0-9A-Fa-f]{1,4}){1,7}|:)' +
        '|fe80:(:[0-9A-Fa-f]{0,4}){0,4}%[0-9A-Za-z]{1,}' +
        '|::(ffff(:0{1,4}){0,1}:){0,1}' +
            '((25[0-5]|(2[0-4]|1{0,1}[0-9])?[0-9])\.){3}' +
            '(25[0-5]|(2[0-4]|1{0,1}[0-9])?[0-9])' +
        '|([0-9A-Fa-f]{1,4}:){1,4}:' +
            '((25[0-5]|(2[0-4]|1{0,1}[0-9])?[0-9])\.){3}' +
            '(25[0-5]|(2[0-4]|1{0,1}[0-9])?[0-9])' +
        ')$'
    );

    /* All 0 */
    if (!ipv6_reg.test(value) || /^[0:.]+$/.test(value))
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    /* Normalize IPv6 address for verification */
    var normalized = NormalizeIpv6(value);
    if (!normalized)
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    var parts = normalized.split(":");
    if (parts.length !== 8)
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    var first  = parseInt(parts[0], 16);
    var second = parseInt(parts[1], 16);

    /* Loopback address: ::1 */
    if (normalized === "0000:0000:0000:0000:0000:0000:0000:0001")
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    /* Multicast address: ff00::/8 */
    if ((first & 0xff00) === 0xff00)
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    /* Site-local unicast address(abandoned): fec0::/10 */
    if ((first & 0xffc0) === 0xfec0)
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    /* IPv4-mapped address: ::ffff:0:0/96 */
    if (parts[0] === "0000" && parts[1] === "0000" && parts[2] === "0000" &&
        parts[3] === "0000" && parts[4] === "0000" && parts[5] === "ffff")
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    /* IPv4-compatible address(abandoned) ::/96 not all 0 and not ::1 */
    if (parts[0] === "0000" && parts[1] === "0000" && parts[2] === "0000" &&
        parts[3] === "0000" && parts[4] === "0000" && parts[5] === "0000" &&
        (parts[6] !== "0000" || parts[7] !== "0000") &&
        normalized !== "0000:0000:0000:0000:0000:0000:0000:0001")
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    /* Discard prefix address: 100::/64 */
    if (first === 0x0100)
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    /* Teredo address: 2001::/32 */
    if (first === 0x2001 && second === 0x0000)
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    /* NAT 6to4 address: 2002::/16 */
    if (first === 0x2002)
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    /* ORCHID/ORCHIDv2 address: 2001:20::/28 */
    if (first === 0x2001 && ((second & 0xfff0) === 0x0020))
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    /* NAT64 Well-Known Prefix address: ff9b::/96 和 64:ff9b:1::/48 */
    if (first === 0x0064 && second === 0xff9b)
    {
        return alert(parent.window.str_info.alt_ip6verify2), !1;
    }

    return !0;
}

function isNetworkOrBroadcastAddress(ip, mask)
{
    var ipParts = ip.split('.').map(Number);
    var maskParts = mask.split('.').map(Number);
    var networkParts = ipParts.map((part, index) => part & maskParts[index]);
    var broadcastParts = networkParts.map((part, index) => part | (~maskParts[index] & 255));

    var isNetworkAddress = ipParts.every((part, index) => part === networkParts[index]);
    var isBroadcastAddress = ipParts.every((part, index) => part === broadcastParts[index]);

    if(isNetworkAddress || isBroadcastAddress)
    {
        return true;
    }
    return false;
}

function NormalizeIpv6(addr)
{
    if (!addr)
    {
        console.log("addr is null");
        return null;
    }

    addr = addr.toLowerCase();
    let parts = addr.split("::");

    if (parts.length > 2) return null;

    let left = parts[0] ? parts[0].split(":") : [];
    let right = (parts.length === 2 && parts[1]) ? parts[1].split(":") : [];

    let missingGroups = 8 - (left.length + right.length);
    if (missingGroups < 0) return null;

    let full = [];

    for (let g of left) full.push(g.padStart(4, "0"));
    for (let i = 0; i < missingGroups; i++) full.push("0000");
    for (let g of right) full.push(g.padStart(4, "0"));

    return full.join(":");
}
function isIpv6Equal(a, b)
{
    let na = NormalizeIpv6(a);
    let nb = NormalizeIpv6(b);

    if (na === null || nb === null) return 1;
    return na === nb ? 0 : 1;
}

var DHCP_WAIT = 1;
var DHCP_DONE = 2;
var DHCP_END = 3;
var newIp;
var dadXml;
var dadCount = 0;
var DAD_INIT = 0;
var DAD_START = 1;
var DAD_WAIT = 2;
var DAD_END = 3;
var dadFlag = DAD_INIT;
var INVALID = "0";
var TENTATIVE = "8";
var TENTATIVE_1 = "9";
var TENTATIVE_2 = "10";
var TENTATIVE_3 = "11";
var TENTATIVE_4 = "12";
var TENTATIVE_5 = "13";
var TENTATIVE_6 = "14";
var TENTATIVE_7 = "15";
var VALID = "16";
var PREFERRED = "48";
var DUPLICATED = "64";
function doSubmit()
{
    if(0 == ValueIsChange())
    {
        return (alert(parent.window.str_info.alt_nochange), !1);
    }
    if (1 == $id("check_dhcp").value)
    {
        if(0 == $id("check_autoDNS").value)
        {
            if(false == dnsVerify($id("txt_dns").value))
            {
                return  $id("txt_dns").focus(),!1;
            }
            if(1 <= ip_ds.state)
            {
                /*for last DHCP state was enable,but now set static DNS*/
               location.href = "/ip_setting.cgi?autodnsSetting=0&ip_dns=" + $id("txt_dns").value + "&mgmt_vlan=" + $id("mgmt_vlan").value;
               return !0;
            }
        }
        else if((1 == $id("check_autoDNS").value) && (1 <= ip_ds.state))
        {
             /*for last DHCP state was enable,but now enable auto DNS*/
            location.href = "/ip_setting.cgi?autodnsSetting=1" + "&mgmt_vlan=" + $id("mgmt_vlan").value;
            return !0;
        }
        if(true == confirm(js_ipmode1 = parent.window.str_info.cfm_ipmode1))
        {
            dhcpFlag = DHCP_START;
            dhcpCount = 0;
            setTimeout(doDhcpPoll, 1000);
        }
        else
        {
            if ("0.0.0.0" === $id("txt_dns").value)
            {
                $id("txt_dns").value = "";
            }
            return 0;
        }
    }
    else
    {
        if (!("0.0.0.0" == $id("txt_addr").value && "0.0.0.0" == $id("txt_mask").value))
        {
            if(0 == ipVerify($id("txt_addr").value))
                return $id("txt_addr").focus(), !1;
            if(0 == maskVerify($id("txt_mask").value))
                return $id("txt_mask").focus(), !1;
            if(true == isNetworkOrBroadcastAddress($id("txt_addr").value,$id("txt_mask").value))
                return alert(parent.window.str_info.alt_ip_mask_verify),!1;
            var r = $id("txt_gateway").value;
            if("" === r)
            {
                $id("txt_gateway").value = "0.0.0.0";
            }
            else if(false == gatewayVerify(r))
            {
                if ("0.0.0.0" === $id("txt_dns").value)
                {
                    $id("txt_dns").value = "";
                }
                return $id("txt_gateway").focus(),!1;
            }
            if(false == dnsVerify($id("txt_dns").value))
            {
                if ("0.0.0.0" === $id("txt_gateway").value)
                {
                    $id("txt_gateway").value = "";
                }
                return $id("txt_dns").focus(),!1;
            }
        }
        else
        {
            alert(parent.window.str_info.alt_ipverify1);
            return !1;
        }
        if (false == confirm(js_ipParam = parent.window.str_info.cfm_ipparam))
        {
            if ("0.0.0.0" === $id("txt_gateway").value)
            {
                $id("txt_gateway").value = "";
            }
            if ("0.0.0.0" === $id("txt_dns").value)
            {
                $id("txt_dns").value = "";
            }
            return false;
        }
        if(-1 == window.location.href.indexOf($id("txt_addr").value))
        {
            if(-1 == window.location.href.indexOf("https"))
            {
                window.top.location.href = "http://" + $id("txt_addr").value;
            }
            else
            {
                window.top.location.href = "https://" + $id("txt_addr").value;
            }
        }
        return document.ip_setting.submit(), !0
    }
}
function doSubmit2()
{
    if(0 == ValueIsChangeIp6())
    {
        return (alert(parent.window.str_info.alt_ip6verify3), !1);
    }

    if(DAD_END != dadFlag)
    {
        if(!getDadResult())
        {
            return (alert(parent.window.str_info.alt_ip6verify7), !1);
        }
    }

    if(true == $id("ip6_manual_config").checked)
    {
        $id("ip6_manual_config").value = "1";

        if("" != $id("txt_ip6_addr").value)
        {
            if(0 == ip6Verify($id("txt_ip6_addr")))
            {
                return $id("txt_ip6_addr").focus(), !1;
            }
            if(0 == ip6PrefixVerify($id("txt_ip6_prefix")))
            {
                return $id("txt_ip6_prefix").focus(), !1;
            }
        }
        else
        {
            if (0 != $id("txt_ip6_prefix").value && 0 == ip_ds.ip6PrefixLen)
            {
                return (alert(parent.window.str_info.alt_ip6verify1), !1);
            }
        }

        /* gateway is valid only when manual ip6_addr and prefix_len exist */
        if("" != $id("txt_ip6_gw").value && "" != $id("txt_ip6_addr").value && 0 != $id("txt_ip6_prefix").value)
        {
            if(0 == ip6Verify($id("txt_ip6_gw")))
            {
                return $id("txt_ip6_gw").focus(), !1;
            }

            if(0 == ip6GwVerify($id("txt_ip6_gw")))
            {
                return $id("txt_ip6_gw").focus(), !1;
            }
        }
        else if("" != $id("txt_ip6_gw").value && "" == $id("txt_ip6_addr").value)
        {
            return (alert(parent.window.str_info.alt_ip6verify1), !1);
        }

        if("" != $id("txt_ip6_addr").value && $id("txt_ip6_addr").value != ip_ds.ip6ManualAddr && CompareIpv6())
        {
            localStorage.setItem("dad_check_needed", "1");
        }
        else
        {
            localStorage.removeItem("dad_check_needed");
        }

        document.ip6_setting.submit();

        return !0;
    }
    else if(true == $id("ip6_auto_config").checked)
    {
        $id("ip6_auto_config").value = "0";

        document.ip6_setting.submit();
    }
}
function getDadResult()
{
    var dadIsOver = false;

    dadXml = parent.getXMLObject();
    if(null == dadXml)
    {
        return;
    }

    dadXml.open("GET", "/dadResult.xml", false);

    dadXml.onreadystatechange = function () {
        if(XML_SEND_COMPLETE == dadXml.readyState)
        {
            if(HTML_STATUS_OK == dadXml.status)
            {
                var text = dadXml.responseText;

                text = text.trim();

                if(text == TENTATIVE)
                {
                    dadIsOver = false;
                }
                else
                {
                    dadIsOver = true;
                }
            }
        }
    }

    dadXml.send(null);

    return dadIsOver;
}
function doDadPoll()
{
    if(DAD_INIT == dadFlag)
    {
        dadFlag = DAD_START;
        doDadClient();
    }

    dadCount++;
    if(DAD_END != dadFlag)
    {
        parent.window.document.getElementById("blockbg").style.display = "block";
        parent.window.document.getElementById("blockmsg").style.display = "block";
        parent.window.document.getElementById("blockmsg").innerHTML = "Wait for get DAD result ... " + dadCount;
        setTimeout(doDadPoll, 1000);
    }
}
function doDadClient()
{
    if(DAD_END == dadFlag)
    {
        return;
    }

    dadXml = parent.getXMLObject();
    if(null == dadXml)
    {
        dadFlag = DAD_INIT;
        return;
    }

    var temp_send_str = "/dadResult.xml";
    if(DAD_START == dadFlag)
    {
        dadFlag = DAD_WAIT;
    }
    dadXml.open("GET", temp_send_str, true);

    dadXml.onreadystatechange = dadRespon;

    dadXml.onerror = function () {
        console.log("onerror: " + temp_send_str);
    };

    dadXml.ontimeout = function () {
        dadFlag = DAD_INIT;
    };

    dadXml.send(null);
}
function dadRespon()
{
    if(XML_SEND_COMPLETE == dadXml.readyState)
    {
        if(HTML_STATUS_OK == dadXml.status)
        {
            var text = dadXml.responseText;

            text = text.trim();

            if(DAD_WAIT == dadFlag)
            {
                if(text == TENTATIVE)
                {
                    dadFlag = DAD_INIT;
                    return;
                }
                else if(text == VALID || text == PREFERRED)
                {
                    dadFlag = DAD_END;
                    parent.window.document.getElementById("blockbg").style.display = "none";
                    parent.window.document.getElementById("blockmsg").style.display = "none";
                    return;
                }
                else if(text == DUPLICATED || text == INVALID)
                {
                    dadFlag = DAD_END;
                    parent.window.document.getElementById("blockbg").style.display = "none";
                    parent.window.document.getElementById("blockmsg").style.display = "none";

                    alert("DAD failed! Please check the IPv6 address.");
                    return;
                }
                else
                {
                    console.log("Unknwon DAD value: " + text);
                }
            }
            dadFlag = DAD_INIT;
        }
    }
}
function doDhcpPoll()
{
    if(dhcpState)
    {
        dhcpState = 0;
        doDhcpClient();
    }
    dhcpCount++;
    if(DHCP_END != dhcpFlag)
    {
        parent.window.document.getElementById("blockbg").style.display = "block";
        parent.window.document.getElementById("blockmsg").style.display = "block";
        parent.window.document.getElementById("blockmsg").innerHTML = "Wait for get DHCP address ... " + dhcpCount;
        setTimeout(doDhcpPoll, 1000);
    }
}
function doDhcpClient()
{
    if(DHCP_END != dhcpFlag)
    {
        dhcpXml = parent.getXMLObject();
        var temp_send_str = "";
        if(null != dhcpXml)
        {
            if(DHCP_START == dhcpFlag)
            {
                if (1 == $id("check_autoDNS").value)
                {
                    temp_send_str = "/ip_setting.cgi?dhcpSetting=2&autodnsSetting=1";
                    dhcpXml.open("GET", temp_send_str, true);
                }
                else
                {
                    var dns = $id("txt_dns").value;
                    temp_send_str = "/ip_setting.cgi?dhcpSetting=2&autodnsSetting=0&ip_dns=";
                    dhcpXml.open("GET", temp_send_str + dns, true);
                }
            }
            if(DHCP_DONE == dhcpFlag)
            {
                temp_send_str = "/ip_setting.cgi?dhcpSetting=4";
                dhcpXml.open("GET", temp_send_str, true);
            }
            if(DHCP_WAIT == dhcpFlag)
            {
                temp_send_str = "/dhcpState.xml";
                dhcpXml.open("GET", temp_send_str, true);
            }
            dhcpXml.onreadystatechange = dhcpRespon;
            dhcpXml.onerror = function (){
                console.log("onerror:"+ temp_send_str);
            }
            dhcpXml.ontimeout = function (){
                dhcpState = 1;
            };
            dhcpXml.send(null);
        }
        else
        {
            dhcpState = 1;
        }
    }
}
function dhcp_refresh_web()
{
    if(-1 == window.location.href.indexOf("https"))
    {
        parent.window.document.getElementById("blockmsg").innerHTML = "Redirect to new IP address : http://" + newIp;
        window.top.location.href = "http://" + newIp;
    }
    else
    {
        parent.window.document.getElementById("blockmsg").innerHTML = "Redirect to new IP address : https://" + newIp;
        window.top.location.href = "https://" + newIp;
    }
}
function dhcpRespon()
{
    if(XML_SEND_COMPLETE == dhcpXml.readyState)
    {
        if( DHCP_DONE == dhcpFlag )
        {
            dhcpFlag = DHCP_END;
            dhcp_refresh_web();
        }
        if (HTML_STATUS_OK == dhcpXml.status)
        {
            if(DHCP_WAIT == dhcpFlag)
            {
                if(-1 == dhcpXml.responseText.indexOf("0.0.0.0"))
                {
                    var rule = /,dhcp_enable:/;
                    var dhcp_list = dhcpXml.responseText.split(rule);
                    var dhcp_ip = "";
                    var dhcp_enable = 0;
                    if(dhcp_list.length >= 2)
                    {
                        dhcp_enable = parseInt(dhcp_list[1],10);
                    }
                    dhcp_ip = dhcp_list[0];
                    if(0 == dhcp_enable)
                    {
                        dhcpFlag = DHCP_END;
                        window.location.reload();
                        alert(parent.window.str_info.alt_dhcp_err + dhcp_ip);
                        parent.window.document.getElementById("blockbg").style.display = "none";
                        parent.window.document.getElementById("blockmsg").style.display = "none";
                    }
                    else
                    {
                        newIp = dhcp_ip;
                        dhcpFlag = DHCP_DONE;
                    }
                }
            }
            else if(DHCP_START == dhcpFlag)
            {
                dhcpFlag = DHCP_WAIT;
            }
            dhcpState = 1;
        }
    }
}
function onChangeState(r)
{
    var a = $id("txt_addr"),
        e = $id("txt_mask"),
        t = $id("txt_gateway"),
        ele_select_dns = $id("check_autoDNS"),
        i = "1" == r;
        a.disabled = i, e.disabled = i, t.disabled = i;

        if(true == i)
        {
            ele_select_dns.disabled = false;
        }
        else
        {
            ele_select_dns.disabled = true;
            ele_select_dns.value = "0";
            AutoDnsChangeState("0")
        }
}
function AutoDnsChangeState(dns_select_input)
{
    let s_ele_txt_dns = $id("txt_dns")
    s_ele_txt_dns.className = "TEXT_ENABLE";
    if("1" == dns_select_input)
    {
        s_ele_txt_dns.disabled = true;
    }
    else
    {
        s_ele_txt_dns.disabled = false;
    }
}
window.onload = () => {
    /* Check last time dad result */
    if(localStorage.getItem("dad_check_needed") == "1")
    {
        dadFlag = DAD_INIT;
        dadCount = 0;
        setTimeout(doDadPoll, 1000);
        localStorage.removeItem("dad_check_needed");
    }
    loadValueIpv6();
    loadValue();
    $id("check_dhcp").onchange = (e) => onChangeState(e.target.value);
    $id("check_autoDNS").onchange = (e) => AutoDnsChangeState(e.target.value);
};
