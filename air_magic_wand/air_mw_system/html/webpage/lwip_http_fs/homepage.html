<script>
var g_Lan=0,g_level=1,g_year=2021,g_product=0;
var doUpgarde = 0;
const G_SFP_PORT_TYPE =
{
    AIR_SFP_PORT_TYPE_COPPER: 0,
    AIR_SFP_PORT_TYPE_SFP: 1,
    AIR_SFP_PORT_TYPE_COMBO_COPPER:2,
    AIR_SFP_PORT_TYPE_COMBO_SFP:3,
    AIR_SFP_PORT_TYPE_LAST:4,
};
const G_SFP_MODE_TYPE =
{
    AIR_PORT_SERDES_MODE_SGMII:0,
    AIR_PORT_SERDES_MODE_1000BASE_X:1,
    AIR_PORT_SERDES_MODE_HSGMII:2,
    AIR_PORT_SERDES_MODE_LAST:3,
};

function docW(a)
{
    document.write(a)
}

function incJs(a)
{
    docW("<script type='text/javascript' src='" + a + "'><\/script>")
}

function g_getPortMediaType()
{
    return G_SFP_PORT_TYPE;
}

function g_getSfpModes()
{
    return G_SFP_MODE_TYPE;
}

function getXMLObject()
{
    var xmlReq = null;
    xmlReq = new XMLHttpRequest();
    !xmlReq && (xmlReq = new ActiveXObject("MSXML2.XMLHTTP"))
    !xmlReq && (xmlReq = new ActiveXObject("Microsoft.XMLHTTP"))
    return xmlReq;
}
if(language == "chinese")
{
    lang_js = "str_info_chinese.js";
}
else if(language == "english")
{
    lang_js = "str_info_english.js";
}
incJs(lang_js);

function g_getPort(a)
{
    for(i=0;i<28;i++)
    {
        if(0 != (a &(0x01 <<i)))
            return i;
    }
}

function g_getTrunkBitMap(trunkInfo)
{
    let bitMap = 0;
    if (false == Array.isArray(trunkInfo)) {
        return bitMap;
    }
    for (let index = 0; index < trunkInfo.length; index++)
    {
        if ( 0 != trunkInfo[index] )
        {
            bitMap = bitMap | (0x01<< index);
        }
    }
    return bitMap;
}
