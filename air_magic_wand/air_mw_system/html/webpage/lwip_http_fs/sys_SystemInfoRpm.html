<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<script type="text/javascript">
var ip6_auto = "Auto";
var ip6_invaild = "Invalid";
var ip6_none = "None"

function docW(a)
{
    document.write(a)
}
function $id(a)
{
    return document.getElementById(a)
}
function isValid(s, e)
{
    return RegExp("^([a-zA-Z 0-9_-]){1," + e + "}$").test(s)
}
function doSubmit()
{
    if($id("tSysName").value.match(/^[ ]*$/))
    {
        return (alert(parent.window.str_info.alt_checknull), !1)
    }
    if(0 == isValid($id("tSysName").value, 32))
    {
        return (alert(parent.window.str_info.alt_checkdevdesc), !1)
    }
    if($id("tSysName").value != data_info.descriStr)
    {
        return location.href = "system_name_set.cgi?sysName=" + $id("tSysName").value;
    }
    else
    {
        return (alert(parent.window.str_info.alt_checksame), !1)
    }
}
function check_charkey(s, e, n)
{
    var r, i = $id(s);
    return !(i.value.length > n) && (8 == (r = (e = e || window.event).keyCode ? e.keyCode : e.which) || 32 <= r &&
        r <= 126 && 34 != r)
}
function loadValue()
{
    $id("tSysName").value = data_info.sysnameStr
    $id("sp_macaddress").innerHTML = data_info.macStr
    $id("sp_ipv4address").innerHTML = data_info.ipStr
    if(typeof data_info.linkLocalIpv6Str == "undefined")
    {
        const row = document.getElementById("linklocal_ipv6");
        row.parentNode.removeChild(row);
    }
    else
    {
        $id("sp_llipv6address").innerHTML = data_info.linkLocalIpv6Str
        $id("sp_llipv6address").innerHTML = $id("sp_llipv6address").innerHTML.replaceAll(ip6_auto, parent.window.str_info.spn_ipv6_auto_state)
        $id("t_ipv4address").innerHTML = parent.window.str_info.spn_ipv4address
    }
    if(typeof data_info.globalIpv6Str == "undefined")
    {
        const row = document.getElementById("global_ipv6");
        row.parentNode.removeChild(row);
    }
    else
    {
        $id("sp_glbipv6address").innerHTML = data_info.globalIpv6Str
        $id("sp_glbipv6address").innerHTML = $id("sp_glbipv6address").innerHTML.replaceAll(ip6_none, parent.window.str_info.spn_ipv6_none)
        $id("sp_glbipv6address").innerHTML = $id("sp_glbipv6address").innerHTML.replaceAll(ip6_auto, parent.window.str_info.spn_ipv6_auto_state)
        $id("sp_glbipv6address").innerHTML = $id("sp_glbipv6address").innerHTML.replaceAll(ip6_invaild, parent.window.str_info.spn_ipv6_invalid_state)
    }
    $id("sp_netmask").innerHTML = data_info.netmaskStr
    $id("sp_gateway").innerHTML = data_info.gatewayStr
    $id("sp_dns").innerHTML = data_info.dnsStr
    $id("sp_firewareversion").innerHTML = data_info.firmwareStr
    $id("sp_hardwareversion").innerHTML = data_info.hardwareStr
    $id("btn_submit").value = parent.window.str_info.btn_apply;
    $id("btn_submit").onclick = () => { return doSubmit(); };
    $id("tSysName").onkeypress = () =>  { return check_charkey("tSysName", event, 32); };
}
window.onload = () => {
    loadValue();
};
</script>
</head>
<body marginwidth="0" marginheight="0">
