<script>

{

        o = (document.all)? document.body.offsetHeight: window.innerHeight,
        el = $id(e);
    el.style.left = .5 * (t - 400), el.style.top = .3 * (o - 300), el.style.display = "";
}

{

    "></TD><TD width=1 bgColor=" + t + "><TD bgColor=" + t + "></TD><TD width=1 bgColor=" + t +
    "></TD><TD width=1 bgColor=" + e + "></TD><TD width=1></TD></TR>", l += "</TBODY></TABLE></TD></TR>",

    " cellSpacing=0 cellPadding=0 border=0>", l += "<TBODY><TR><TD width=1 bgColor=" + e + "></TD>", l += "<TD id=oINNER bgColor=" + t + " width=" + (
    o - 2) + " align=center vAlign=middle>" + d + "</TD>", l += "<TD width=1 bgColor=" + e +

    "></TD><TD colSpan=3></TD></TR>", l += "</TBODY></TABLE></TD></TR></TBODY></TABLE>", document.write(l)

function changelanguage()
{
    return location.href = "languagechange.cgi?lang_sel=" + $id("lang_sel").value;

function initlang()
{
    $id("lang_sel").value = language;
}
function checkInput() {
    var e;
    var f = $id('form0'), e_info = $id("ret_info");
    return "" == f.username.value ? (e =
        '<SPAN class="WARN_NORMAL" id="t_error6">'+ str_info.spn_error6 +'</SPAN>',
        e_info.innerHTML = e, e_info.style.display = "block",
        f.username.focus(), !1) : 16 < f.username.length ? (e =
        '<SPAN class="WARN_NORMAL" id="t_error7">'+ str_info.spn_error7 +'</SPAN>',
        e_info.innerHTML = e, e_info.style.display = "block",
        f.username.focus(), !1) : "" == f.password.value ? (e =
        '<SPAN class="WARN_NORMAL" id="t_error8">'+ str_info.spn_error8 +'</SPAN>',
        e_info.innerHTML = e, e_info.style.display = "block",
        f.password.focus(), !1) : 16 < f.password.legnth ? (e =
        '<SPAN class="WARN_NORMAL" id="t_error9">'+ str_info.spn_error9 +'</SPAN>',
        e_info.innerHTML = e, e_info.style.display = "block",
        f.password.focus(), !1) : !!1;
}
function isSha256(str) {
    return /^[a-f0-9]{64}$/i.test(str);
}
function submit1(e) {
    e.preventDefault();
    if (!checkInput())
        return !1;
    $id('logon').disabled = true;

    const pwdInput = $id('password');
    let password = pwdInput.value;
    if (!isSha256(password)) {
        pwdInput.value = CryptoJS.SHA256(password).toString(CryptoJS.enc.Hex);
    }
    e.target.submit();
}
async function sha256Pwd(p) {
    const txtenc = new TextEncoder();
    const data = txtenc.encode(p);
    const buffer = await crypto.subtle.digest('SHA-256', data);
    const hash = Array.from(new Uint8Array(buffer));
    return hash.map(b => b.toString(16).padStart(2, '0')).join('');
}
async function submit2(e) {
    e.preventDefault();
    if (!checkInput())
        return !1;
    $id('logon').disabled = true;

    const pwdInput = $id('password');
    let password = pwdInput.value;
    if (!isSha256(password)) {
        pwdInput.value = await sha256Pwd(password);
    }
    e.target.submit();
}
window.onload = function () {
    history.replaceState({}, null, "index.html");
    var errType = "<!--#errorType-->";
    var e = $id("username");
    if (e.focus(), e.select(), resize("center"), (-1 != errType.indexOf("0")))
    {
        $id("ret_info").style.display = "none";
    }
    else if (-1 != errType.indexOf("1"))
    {
        $id("ret_info").style.display = "block", str = '<SPAN class="WARN_NORMAL" id="t_error1">'+ str_info.spn_error1 +'', $id("ret_info").innerHTML = str;
    }
    else if (-1 != errType.indexOf("2"))
    {
        $id("ret_info").style.display = "block", str = '<SPAN class="WARN_NORMAL" id="t_error1">'+ str_info.login_max +'', $id("ret_info").innerHTML = str;
    }
    $id('form0').addEventListener('submit', (!ishttps)? submit1: submit2);
    $id("lang_sel").onchange = () => { changelanguage(); };
    $id("btn_clear").onclick = () => { doClear(); };
}
window.onresize = () => { resize("center"); };
