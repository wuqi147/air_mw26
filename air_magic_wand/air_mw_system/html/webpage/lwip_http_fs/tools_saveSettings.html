<!DOCTYPE html>
<html>
<head>
<style>
body,input,select {
    color: <!--#subPageFont-->; /* Subpage font color */
}
fieldset {
    font-size: 12px;
    width: 1000px;
    margin: 1em auto;
    padding: 1em;
    border: 1px solid <!--#subPgFcGrpBdr-->; /* Subpage function group border color */
}
legend {
    font-weight: bold;
    font-size: 150%;
    color: <!--#subPgFcGrpTtl-->; /* Subpage function group title font color */
    font-family: Arial;
}
span.BOLDER {
    font-size: 150%;
    font-family: "Arial";
    font-weight: bolder;
}
span.NORMAL {
    font-size: 150%;
    font-family: "Arial";
}
table {
    margin: 1em auto;
    border-collapse: collapse;
    text-align: center;
}
table td {
    height: 32px;
    line-height: 21px;
}
TABLE.BOTTOM_LINE {
    width: 100%;
    text-align: left;
}
TD.BOTTOM_LINE {
    background-color: <!--#subPageDivider-->; /* Subpage divider color */
    width: 580px;
    height: 2px;
}
a.BTN {
    background: url(button.gif) left -42px;
    text-decoration: none;
    height: 21px;
    float: left;
    margin: 0;
    transform: scale(1.5, 1.5) translate(0%, 20%);
}
a.BTN input {
    background: url(button.gif) right -42px;
    padding: 4px 3px 4px 0;
    margin: 0 0 0 3px;
    float: left;
    height: 21px;
    border: none;
}
INPUT.BTN_NORMAL_BTN {
    font-family: "Arial";
    width: 60px;
}
</style>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<script type="text/javascript">
var saveXml;
var XML_SEND_COMPLETE = 4;
var HTML_STATUS_OK = 200;
function docW(a)
{
    document.write(a)
}
function $id(a)
{
    return document.getElementById(a)
}
function saveResp()
{
    if(XML_SEND_COMPLETE == saveXml.readyState)
    {
        if(HTML_STATUS_OK == saveXml.status)
        {
            if(Number(saveXml.responseText))
            {
                alert(parent.window.str_menu.savingConfigOk);
            }
            else
            {
                alert(parent.window.str_menu.savingConfigFail);
            }
        }
    }
}
function doSave()
{
    saveXml = parent.getXMLObject();
    if(null != saveXml)
    {
        saveXml.onreadystatechange = saveResp;
        saveXml.open("GET", "/saveSetting.xml", true);
        saveXml.send(null);
    }
}
window.onload = function () {
    $id("btn_apply").onclick = () => { doSave(); };
    $id("btn_apply").value = parent.window.sysreboot_info.btn_save;
}
</script>
</head>
<body marginwidth="0" marginheight="0">
  <div id="autoHeight" class="AUTOHEIGHT_MAIN">
     <div id="div_tip_mask" class="TIP_MASK">
        <div id="div_tip_svr" class="TIP"><span id="sp_tip_svr" class="TIP_CONTENT"></span></div>
     </div>
     <fieldset>
        <legend><span class="NORMAL"><script>docW(parent.window.sysreboot_info.lgd_savecfg)</script></span></legend>
        <div>
           <table width="100%">
              <tbody>
                 <tr height="8">
                    <td>
                       <table class="BTN_WRAPPER" align="center">
                          <tbody>
                             <tr>
                                <td> <span id="t_save_settings" class="NORMAL"><script>docW(parent.window.sysreboot_info.td_savecfg)</script></span></td>
                             </tr>
                             <tr height="8">
                                <td></td>
                             </tr>
                          </tbody>
                       </table>
                       <table class="BTN_WRAPPER" align="center">
                          <tbody>
                            <tr>
                                <td> <a class="BTN"> <input type="button" id="btn_apply" class="BTN_NORMAL_BTN"> </a> </td>
                            </tr>
                          </tbody>
                       </table>
                    </td>
                 </tr>
              </tbody>
           </table>
        </div>
     </fieldset>
  </div>
</body>
</html>
