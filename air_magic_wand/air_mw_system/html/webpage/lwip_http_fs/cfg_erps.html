<script type="text/javascript">
var XML_SEND_COMPLETE = 4;
var HTML_STATUS_OK = 200;
var urlString ='';
var xmlReq;
var submitUrlString='';
var west_port_idx = 0;
var east_port_idx = 0;
var west_port_role = 0;
var east_port_role = 0;
var is_edit = 0;

const portRoleEnum = {
    Transfer: 0,
    Neighbor: 1,
    Owner: 2,
};

const portStateEnum = {
    Forwarding: 0x00,
    Discarding: 0x01,
};

const instanceStateEnum = {
    Idle: 0x00,
    Protection: 0x01,
    ManualSwitch: 0x02,
    ForcedSwitch: 0x03,
    Pending: 0x04,
    Init: 0x05,
};

function docW(a) {
    document.write(a)
}
function $id(a) {
    return document.getElementById(a)
}

function onWestPortChangeState(r)
{
    var ele_east_role = $id("East_role"),
    i = ("RPL-owner" == r || "RPL-neighbor" == r);

    if(true == i)
    {
        ele_east_role.disabled = true;
        ele_east_role.value = "Transfer";
    }
    else
    {
        ele_east_role.disabled = false;
    }
}

function onEastPortChangeState(r)
{
    var ele_west_role = $id("West_role"),
    i = ("RPL-owner" == r || "RPL-neighbor" == r);

    if(true == i)
    {
        ele_west_role.disabled = true;
        ele_west_role.value = "Transfer";
    }
    else
    {
        ele_west_role.disabled = false;
    }
}

function westEastPortVerify()
{

    west_port_idx = $id("West_port").value;
    east_port_idx = $id("East_port").value;

    switch($id("West_role").value)
    {
        case "Transfer":
            west_port_role = portRoleEnum.Transfer;
            break;
        case "RPL-neighbor":
            west_port_role = portRoleEnum.Neighbor;
            break;
        case "RPL-owner":
            west_port_role = portRoleEnum.Owner
            break;
    }

    switch($id("East_role").value)
    {
        case "Transfer":
            east_port_role = portRoleEnum.Transfer;
            break;
        case "RPL-neighbor":
            east_port_role = portRoleEnum.Neighbor;
            break;
        case "RPL-owner":
            east_port_role = portRoleEnum.Owner
            break;
    }

    if (east_port_idx == west_port_idx)
    {
        return 1;
    }
    var i = 0, trunkid = 0;
    var pStr = [trunk_conf.portStr_g1, trunk_conf.portStr_g2, trunk_conf.portStr_g3, trunk_conf.portStr_g4];
    for (trunkid = 1; trunkid <= trunk_conf.maxTrunkNum; trunkid++)
    {
        var first = 1;
        for(i = 0; i < trunk_conf.portNum; i++)
        {
            if ((0 != pStr[(trunkid - 1)][i] && i == (east_port_idx - 1)) ||
                (0 != pStr[(trunkid - 1)][i] && i == (west_port_idx - 1)))
                return 2;
        }
    }
    return 0;
}


function ringIdVerify(r)
{
    if (0 == r.length || r < 1 || r > 255)
    {
        return false;
    }
    return true;
}

function ctrlVlanVerify(r)
{
    if (0 == r.length || r < 1 || r > 4094)
    {
        return 0;
    }

    if (-1 != currentVlanId.indexOf(parseInt(r, 10)))
    {
        return 1;
    }

    return 2;
}

function dataVlanVerify(r)
{
    if (0 == r.length || 16 < r.length)
    {
        return false;
    }

    var str = r.replace(/-/gi, ",");
    var vlan_id_array = str.split(",");

    var i = 0;
    for (i = 0 ;i< vlan_id_array.length;i++)
    {

        if (true != (/^[0-9]{1,4}$/.test(vlan_id_array[i])))
        {
            return false;
        }

        if(parseInt(vlan_id_array[i],10) < 1 || parseInt(vlan_id_array[i],10) > 4094)
        {
            return false;
        }

        if (1 < i && parseInt(vlan_id_array[i-1]) >= parseInt(vlan_id_array[i]))
        {
            return false;
        }
    }

    return true;
}

function wtrTimerVerify(r)
{
    if (0 == r.length || r < 1 || r > 12)
    {
        return false;
    }
    return true;
}

function guardTimerVerify(r)
{
    if (0 == r.length || r < 10 || r > 2000)
    {
        return false;
    }

    if (parseInt(r)%10 != 0)
    {
        return false;
    }

    return true;
}

function holdOffTimerVerify(r)
{
    if (0 == r.length || r < 0 || r > 10000)
    {
        return false;
    }

    if (parseInt(r)%100 != 0)
    {
        return false;
    }

    return true;
}

function appendString(param, value)
{
    if('' == value)
    {
        submitUrlString += "&"+param+"=0";
    }
    else
    {
        submitUrlString += "&"+param+"="+value ;
    }
}

function doSubmit()
{

    if (2 != currentVlanState)
    {
        alert(parent.window.erps_info.spn_eprs_enable_8021q_vlan_first);
        return false;
    }
    if (1 == stpEn)
    {
        alert(parent.window.erps_info.spn_eprs_stp_enabled);
        return false;
    }
    if (1 == lpEn)
    {
        alert(parent.window.erps_info.spn_eprs_lp_enabled);
        return false;
    }


    if(false == ringIdVerify($id("ring_id_cfg").value))
    {
        alert(parent.window.erps_info.spn_eprs_invalid_ring_id);
        return false;
    }

    if(0 == ctrlVlanVerify($id("ctrl_vlan_cfg").value))
    {
        alert(parent.window.erps_info.spn_eprs_invalid_ctrl_vlan);
        return false;
    }
    else if(1 == ctrlVlanVerify($id("ctrl_vlan_cfg").value) && 0 == is_edit)
    {
        alert(parent.window.erps_info.spn_eprs_duplicated_ctrl_vlan);
        return false;
    }

    if(false == dataVlanVerify($id("data_vlan_cfg").value))
    {
        alert(parent.window.erps_info.spn_eprs_invalid_data_vlan);
        return false;
    }

    if(1 == westEastPortVerify())
    {
        alert(parent.window.erps_info.spn_eprs_invalid_west_east_port);
        return false;
    }
    else if(2 == westEastPortVerify())
    {
        alert(parent.window.erps_info.spn_eprs_west_east_port_cant_be_trunk_port);
        return false;
    }

    if(false == wtrTimerVerify($id("wtr_timer_cfg").value))
    {
        alert(parent.window.erps_info.spn_eprs_invalid_wtr_timer);
        return false;
    }

    if(false == guardTimerVerify($id("guard_timer_cfg").value))
    {
        alert(parent.window.erps_info.spn_eprs_invalid_guard_timer);
        return false;
    }

    if(false == holdOffTimerVerify($id("hold_off_timer_cfg").value))
    {
        alert(parent.window.erps_info.spn_eprs_invalid_hold_off_timer);
        return false;
    }

    if (erpsInfo[0][0] != 0 &&
        erpsInfo[0][1] != 0 &&
        erpsInfo[0][2] != "0")
    {
        if (parseInt($id("ring_id_cfg").value) != erpsInfo[0][0] ||
            parseInt($id("ctrl_vlan_cfg").value) != erpsInfo[0][1] ||
            $id("data_vlan_cfg").value != erpsInfo[0][2])
        {
            if (0 == is_edit)
            {
                alert(parent.window.erps_info.spn_eprs_single_instance);
                return false;
            }
            else if (1 == is_edit)
            {
                alert(parent.window.erps_info.spn_eprs_not_allow_modification);
                return false;
            }
        }
    }

    submitUrlString='instanceId=1';

    appendString("ringId", $id("ring_id_cfg").value);
    appendString("ctrlVlan", $id("ctrl_vlan_cfg").value);
    appendString("dataVlan", $id("data_vlan_cfg").value);

    if (1 == $id("revertiveEn").checked)
    {
        appendString("revMode", $id("revertiveEn").value);
    }
    else if (1 == $id("revertiveDis").checked)
    {
        appendString("revMode", $id("revertiveDis").value);
    }

    appendString("westPort", parseInt(west_port_idx) << 2 | parseInt(west_port_role));
    appendString("eastPort", parseInt(east_port_idx) << 2 | parseInt(east_port_role));
    appendString("wtrTimer", $id("wtr_timer_cfg").value);

    var guard_timer_cfg_str = $id("guard_timer_cfg").value;
    appendString("guardTimer", guard_timer_cfg_str.substring(0, guard_timer_cfg_str.length - 1));

    var hold_off_timer_cfg_str = $id("hold_off_timer_cfg").value;
    appendString("holdOffTimer", hold_off_timer_cfg_str.substring(0, hold_off_timer_cfg_str.length - 2));

    /* VLAN setting */

    var portBitmap = (0x1 << parseInt(west_port_idx)) | (0x1 << parseInt(east_port_idx));
    var vidx;
    var i = 0, j = 0;
    var str = $id("data_vlan_cfg").value;
    var vlan_id_array = str.split(",");
    let all_data_vlan_id = [];
    var temp_id_array;
    var vidx_bmp_for_fid;

    for (i=0 ; vlan_id_array[i]!= undefined ; i++)
    {
        if (true == vlan_id_array[i].includes("-"))
        {
            temp_id_array = vlan_id_array[i].split("-");
            for(j = parseInt(temp_id_array[0]) ; j <= parseInt(temp_id_array[1]) ; j++)
            {
                all_data_vlan_id.push(parseInt(j));
            }
        }
        else
        {
            all_data_vlan_id.push(parseInt(vlan_id_array[i]));
        }
    }

    if (all_data_vlan_id.includes(parseInt($id("ctrl_vlan_cfg").value)))
    {
        alert(parent.window.erps_info.spn_eprs_ctrl_vlan_outside_data_vlan);
        return false;
    }

    for (i = 0 ;i < currentVlanId.length; i++)
    {
        if(all_data_vlan_id.includes(currentVlanId[i]) && currentVlanId[i] != erpsInfo[0][1])
        {
            vidx_bmp_for_fid |= 1 << (i);
        }
    }

    if (0 == is_edit)
    {
        vidx = currentVlanId.indexOf(0);
        if (vidx == -1)
        {
            alert(parent.window.erps_info.spn_eprs_max_vlan_entry_reached);
            return;
        }
        appendString("action", "add");
    }
    else
    {
        vidx = currentVlanId.indexOf(erpsInfo[0][1]);
        appendString("action", "mod");
    }
    appendString("vid", $id("ctrl_vlan_cfg").value);
    appendString("vidx", vidx+1);
    appendString("tagMbrs", portBitmap);
    appendString("fidx", vidx_bmp_for_fid);


    is_edit = 0;
    return location.href = "erpsSetting.cgi?" + submitUrlString;
}

function getCurrent()
{
    if (0 == erpsInfo[0][0])
    {
        $id("status").style.display = "none";
        return false;
    }

    $id("ring_id").innerHTML = erpsInfo[0][0];
    $id("control_vlan").innerHTML = erpsInfo[0][1];
    $id("data_vlan").innerHTML = erpsInfo[0][2];

    if ((erpsInfo[0][4] & 0b00000011) ==  portRoleEnum.Neighbor ||
        (erpsInfo[0][5] & 0b00000011) ==  portRoleEnum.Neighbor)
    {
        $id("node_type").innerHTML = parent.window.erps_info.spn_eprs_rpl_neighbor;
    }
    else if ((erpsInfo[0][4] & 0b00000011) ==  portRoleEnum.Owner ||
        (erpsInfo[0][5] & 0b00000011) ==  portRoleEnum.Owner )
    {
        $id("node_type").innerHTML = parent.window.erps_info.spn_eprs_rpl_owner;
    }
    else
    {
        $id("node_type").innerHTML = parent.window.erps_info.spn_eprs_transfer;
    }

    if (erpsInfo[0][3] == 0)
    {
        $id("revertive_mode").innerHTML = parent.window.str_info.opt_disable;
    }
    else
    {
        $id("revertive_mode").innerHTML = parent.window.str_info.opt_enable;
    }
    $id("west_port").innerHTML = erpsInfo[0][4] >> 2;
    if( erpsInfo[0][9] == portStateEnum.Forwarding)
    {
        $id("west_port_state").innerHTML = parent.window.erps_info.spn_eprs_forwarding;
    }
    else
    {
        $id("west_port_state").innerHTML = parent.window.erps_info.spn_eprs_discarding;
    }
    $id("east_port").innerHTML = erpsInfo[0][5] >> 2;
    if( erpsInfo[0][10] == portStateEnum.Forwarding)
    {
        $id("east_port_state").innerHTML = parent.window.erps_info.spn_eprs_forwarding;
    }
    else
    {
        $id("east_port_state").innerHTML = parent.window.erps_info.spn_eprs_discarding;
    }

    switch(erpsInfo[0][11])
    {
        case instanceStateEnum.Protection:
            $id("instance_state").innerHTML = parent.window.erps_info.spn_eprs_protection;
            break;
        case instanceStateEnum.ManualSwitch:
            $id("instance_state").innerHTML = parent.window.erps_info.spn_eprs_manual_switch;
            break;
        case instanceStateEnum.ForcedSwitch:
            $id("instance_state").innerHTML = parent.window.erps_info.spn_eprs_forced_switch;
            break;
        case instanceStateEnum.Pending:
            $id("instance_state").innerHTML = parent.window.erps_info.spn_eprs_pending;
            break;
        case instanceStateEnum.Init:
            $id("instance_state").innerHTML = parent.window.erps_info.spn_eprs_init;
            break;
        default:
        case instanceStateEnum.Idle:
            $id("instance_state").innerHTML = parent.window.erps_info.spn_eprs_idle;
            break;
    }
}

function doEdit()
{
    is_edit = 1;

    $id("ring_id_cfg").value = erpsInfo[0][0];
    $id("ctrl_vlan_cfg").value = erpsInfo[0][1];
    $id("data_vlan_cfg").value = erpsInfo[0][2];
    if (1 == erpsInfo[0][3])
        $id("revertiveEn").checked = 1;
    else
        $id("revertiveDis").checked = 1;

    var i = 0;

    var westPort = erpsInfo[0][4] >> 2;
    var westPortRole = erpsInfo[0][4] & 0x03;
    var eastPort = erpsInfo[0][5] >> 2;
    var eastPortRole = erpsInfo[0][5] & 0x03;

    let wp = $id("West_port");
    let wpr = $id("West_role");
    let ep = $id("East_port");
    let epr = $id("East_role");

    wp.innerHTML = "";
    wpr.innerHTML = "";
    ep.innerHTML = "";
    epr.innerHTML = "";

    for (i = 0 ; i < erpsPort.length; i++)
    {
        if (westPort == erpsPort[i])
            wp.innerHTML+=("<option value=" + erpsPort[i] + " selected>Port " + erpsPort[i] + "</option>")
        else
            wp.innerHTML+=("<option value=" + erpsPort[i] + ">Port " + erpsPort[i] + "</option>")
    }

    if( westPortRole == portRoleEnum.Transfer )
    {
        wpr.innerHTML += ('<option value= "Transfer" id = "transfer" selected>' + parent.window.erps_info.spn_eprs_transfer);
        wpr.innerHTML += ('<option value= "RPL-neighbor" id = "neighbor">' + parent.window.erps_info.spn_eprs_rpl_neighbor);
        wpr.innerHTML += ('<option value= "RPL-owner" id = "owner">' + parent.window.erps_info.spn_eprs_rpl_owner);

    }
    else if ( westPortRole == portRoleEnum.Owner )
    {
        wpr.innerHTML += ('<option value= "Transfer" id = "transfer">' + parent.window.erps_info.spn_eprs_transfer);
        wpr.innerHTML += ('<option value= "RPL-neighbor" id = "neighbor">' + parent.window.erps_info.spn_eprs_rpl_neighbor);
        wpr.innerHTML += ('<option value= "RPL-owner" id = "owner" selected>' + parent.window.erps_info.spn_eprs_rpl_owner);
        epr.disabled = true;
    }

    for (i = 0 ; i < erpsPort.length; i++)
    {
        if (eastPort == erpsPort[i])
            ep.innerHTML+=("<option value=" + erpsPort[i] + " selected>Port " + erpsPort[i] + "</option>")
        else
            ep.innerHTML+=("<option value=" + erpsPort[i] + ">Port " + erpsPort[i] + "</option>")
    }

    if( eastPortRole == portRoleEnum.Transfer )
    {
        epr.innerHTML += ('<option value= "Transfer" id = "transfer" selected>' + parent.window.erps_info.spn_eprs_transfer);
        epr.innerHTML += ('<option value= "RPL-neighbor" id = "neighbor">' + parent.window.erps_info.spn_eprs_rpl_neighbor);
        epr.innerHTML += ('<option value= "RPL-owner" id = "owner">' + parent.window.erps_info.spn_eprs_rpl_owner);
        wpr.disabled = false;
    }
    else if ( eastPortRole == portRoleEnum.Neighbor )
    {
        epr.innerHTML += ('<option value= "Transfer" id = "transfer">' + parent.window.erps_info.spn_eprs_transfer);
        epr.innerHTML += ('<option value= "RPL-neighbor" id = "neighbor" selected>' + parent.window.erps_info.spn_eprs_rpl_neighbor);
        epr.innerHTML += ('<option value= "RPL-owner" id = "owner">' + parent.window.erps_info.spn_eprs_rpl_owner);
        wpr.disabled = true;
    }
    else if ( eastPortRole == portRoleEnum.Owner )
    {
        epr.innerHTML += ('<option value= "Transfer" id = "transfer">' + parent.window.erps_info.spn_eprs_transfer);
        epr.innerHTML += ('<option value= "RPL-neighbor" id = "neighbor">' + parent.window.erps_info.spn_eprs_rpl_neighbor);
        epr.innerHTML += ('<option value= "RPL-owner" id = "owner" selected>' + parent.window.erps_info.spn_eprs_rpl_owner);
        wpr.disabled = true;
    }

    $id("wtr_timer_cfg").value = erpsInfo[0][6];
    $id("guard_timer_cfg").value = erpsInfo[0][7];
    $id("hold_off_timer_cfg").value = erpsInfo[0][8];

}

function doDelete()
{
    var vidx = currentVlanId.indexOf(erpsInfo[0][1]);

    var westPort = erpsInfo[0][4] >> 2;
    var eastPort = erpsInfo[0][5] >> 2;

    var portBitmap = (0x1 << parseInt(westPort)) | (0x1 << parseInt(eastPort));

    submitUrlString='instanceId=1';
    appendString("action", "del");
    appendString("ringId", erpsInfo[0][0]);
    appendString("ctrlVlan", "0");
    appendString("vid", erpsInfo[0][1]);
    appendString("vidx", vidx+1);
    appendString("tagMbrs", portBitmap);

    return location.href = "erpsSetting.cgi?" + submitUrlString;
}

function curState()
{

    var state;
    if ((XML_SEND_COMPLETE == xmlReq.readyState) && (HTML_STATUS_OK == xmlReq.status)) {

        state = xmlReq.responseText.split(",");

        if( parseInt(state[0]) == portStateEnum.Forwarding)
        {
            $id("west_port_state").innerHTML = parent.window.erps_info.spn_eprs_forwarding;
        }
        else
        {
            $id("west_port_state").innerHTML = parent.window.erps_info.spn_eprs_discarding;
        }


        if( parseInt(state[1]) == portStateEnum.Forwarding)
        {
            $id("east_port_state").innerHTML = parent.window.erps_info.spn_eprs_forwarding;
        }
        else
        {
            $id("east_port_state").innerHTML = parent.window.erps_info.spn_eprs_discarding;
        }

        switch(parseInt(state[2]))
        {
            case instanceStateEnum.Idle:
                $id("instance_state").innerHTML = parent.window.erps_info.spn_eprs_idle;
                break;
            case instanceStateEnum.Protection:
                $id("instance_state").innerHTML = parent.window.erps_info.spn_eprs_protection;
                break;
            case instanceStateEnum.ManualSwitch:
                $id("instance_state").innerHTML = parent.window.erps_info.spn_eprs_manual_switch;
                break;
            case instanceStateEnum.ForcedSwitch:
                $id("instance_state").innerHTML = parent.window.erps_info.spn_eprs_forced_switch;
                break;
            case instanceStateEnum.Pending:
                $id("instance_state").innerHTML = parent.window.erps_info.spn_eprs_pending;
                break;
            case instanceStateEnum.Init:
                $id("instance_state").innerHTML = parent.window.erps_info.spn_eprs_init;
                break;
        }
    }
}

function doUpdate()
{
    xmlReq = parent.getXMLObject();
    if(null != xmlReq)
    {
        xmlReq.onreadystatechange = curState;
        xmlReq.open("GET", "/erpsState.xml", true);
        xmlReq.send(null);
    }
}
function onlyNum(e) {
    e.target.value = e.target.value.replace(/[^0-9]/g,'');
}
window.onload = function () {
    $id("ring_id_cfg").onkeyup = (e) => { onlyNum(e); };
    $id("ctrl_vlan_cfg").onkeyup = (e) => { onlyNum(e); };
    $id("West_role").onchange = (e) => { onWestPortChangeState(e.target.value); };
    $id("East_role").onchange = (e) => { onEastPortChangeState(e.target.value); };
    $id("wtr_timer_cfg").onkeyup = (e) => { onlyNum(e); };
    $id("guard_timer_cfg").onkeyup = (e) => { onlyNum(e); };
    $id("hold_off_timer_cfg").onkeyup = (e) => { onlyNum(e); };
    $id("btn_apply").onclick = () => { doSubmit(); };
    $id("btn_apply").value = parent.window.str_info.btn_apply;
    $id("edit_1").onclick = () => { doEdit(); };
    $id("delete_1").onclick = () => { doDelete(); };
    $id("update_1").onclick = () => { doUpdate(); };
    getCurrent();
}
</script>
