<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<script type="text/javascript">
const MAX_FILE_SIZE = 2.5*1024*1024;
const XML_SEND_COMPLETE = 4;
const HTML_STATUS_OK = 200;
const TIME_STOP = 200;
const IS_UPLOAD = 2;
const IS_ERASE = 3;
var curmsg = parent.window.fwupdate_info.cur_upload;
var msg_time = 0;
var isReady = 0;
const S_E_UPLOAD = 1;
const S_E_WRITE = 2;
const S_E_CRCERROR = 3;
const S_E_ERRORUPLOAD = 4;
const S_E_WAIT_FINISH = 5;
const LARGEST_DENOMINATOR = <!--#eraseTime-->;
var _start = 0;
var _end = SLICE_SIZE;
var img;
var xmlreq;
var chunkNum = 0;
var interval;

function param_init()
{
    _start = 0;
    _end = SLICE_SIZE;
    isReady = 0;
    chunkNum = 0;
}
function docW(a)
{
    document.write(a)
}
function $id(a)
{
    return document.getElementById(a)
}
function background_timer()
{
    countDown();
    if(TIME_STOP != msg_time)
    {
        interval.postMessage(1000);
    }
}
function normal_timer()
{
    countDown();
    if(TIME_STOP != msg_time)
    {
        setTimeout(normal_timer, 1000);
    }
}
function countDown()
{
    if(isReady == IS_ERASE)
    {
        msg_time = Math.round((chunkNum * 100) / LARGEST_DENOMINATOR);
        if(chunkNum < LARGEST_DENOMINATOR)
        {
            chunkNum++;
        }
    }
    else
    {
        msg_time = Math.round(((chunkNum * SLICE_SIZE * 100) / img.size) * 100 / LARGEST_DENOMINATOR);
    }
    parent.window.document.getElementById("blockmsg").innerHTML = curmsg + msg_time + "%";
    if(100 <= msg_time )
    {
        top.location.href = "index.html";
    }
}
function uploadCbk()
{
    var upStatus = 0;
    if(XML_SEND_COMPLETE == xmlreq.readyState)
    {
        if (HTML_STATUS_OK == xmlreq.status)
        {
            upStatus = Number(xmlreq.responseText);
            if(S_E_UPLOAD == upStatus)
            {
                curmsg = parent.window.fwupdate_info.cur_upload;
                isReady = IS_UPLOAD;
            }
            else if(S_E_WRITE == upStatus)
            {
                curmsg = parent.window.fwupdate_info.cur_erase;
                isReady = IS_ERASE;
                chunkNum = 100;
            }
            else
            {
                if(S_E_CRCERROR == upStatus)
                {
                    alert(parent.window.fwupdate_info.cur_errCRC);
                    msg_time = TIME_STOP;
                }
                else if(S_E_ERRORUPLOAD == upStatus)
                {
                    alert(parent.window.fwupdate_info.cur_errSend);
                    msg_time = TIME_STOP;
                }
                else
                {
                    return;
                }
                parent.window.document.getElementById("blockbg").style.display = "none";
                parent.window.document.getElementById("blockmsg").style.display = "none";
                parent.window.doUpgarde = false;
            }

            chunkNum++;
            _start = _end;
            _end = _start + SLICE_SIZE;
            if(TIME_STOP != msg_time)
            {
                if((chunkNum % 10) || (isReady == IS_ERASE))
                {
                    sendChunk();
                }
                else
                {
                    setTimeout(sendChunk, 200);
                }
            }
            else
            {
                param_init();
            }
        }
    }
}
function sendChunk()
{
    var chunk = 0;
    var suri;

    if(_start < img.size)
    {
        if(img.mozSlice)
        {
            chunk = img.mozSlice(_start, _end);
        }
        else if(img.webkitSlice)
        {
            chunk = img.webkitSlice(_start, _end);
        }
        else
        {
            chunk = img.slice(_start, _end);
        }
        if(_end < img.size)
        {
            suri = "/fupgrade.cgi?id=" + chunkNum;
        }
        else
        {
            suri = "/fupgrade.cgi?id=End";
        }

        var formdata = new FormData();
        formdata.append("file-data", chunk);
        xmlreq = parent.getXMLObject();
        xmlreq.open("POST", suri, true);
        if(0 == chunkNum)
        {
            xmlreq.setRequestHeader("file-size", img.size);
        }
        xmlreq.onreadystatechange = uploadCbk;
        xmlreq.send(formdata);
    }
    else if(isReady == IS_ERASE)
    {
        xmlreq = parent.getXMLObject();
        if(null != xmlreq)
        {
            xmlreq.open("GET", "/fuState.xml", true);
            xmlreq.send(null);
        }
    }
}
function fwupgrade_confirm()
{
    var KEY_ENTER_EVENT = 13;
    var form = document.ConfigForm;
    if("" == form.uploadfile.value)
    {
        alert(parent.window.fwupdate_info.err_file);
        return false;
    }
    else if(event.keyCode == KEY_ENTER_EVENT)
    {
        return false;
    }
    else
    {
        img = document.getElementById("uploadfile").files[0];
        if(MAX_FILE_SIZE < img.size)
        {
            alert(parent.window.fwupdate_info.err_size + (MAX_FILE_SIZE / (1024*1024)) + "M");
            return false;
        }
        msg_time = 0;
        isReady = IS_UPLOAD;
        parent.window.document.getElementById("blockbg").style.display = "block";
        parent.window.document.getElementById("blockmsg").style.display = "block";
        parent.window.document.getElementById("blockmsg").innerHTML = curmsg + msg_time + "%";

        try{
            sendChunk();
        }
        catch(e)
        {
            document.ConfigForm.submit();
        }
        parent.window.doUpgarde = true;
        if(window.Worker)
        {
            interval = new Worker("upgradeworker.js");
            interval.postMessage(1000);
            interval.onmessage = background_timer;
        }
        else
        {
            normal_timer();
        }
        return true;
    }
}
function getFile(file)
{
    document.getElementById("fname").innerHTML = '<input name="path" size="25" value="'+ file[0].name +'" readonly>';
}
function showfilename()
{
    $id("path").value = $id("uploadfile").value.replace(/[^\\\/]*[\\\/]+/g, "");
}
window.onload = function () {
    $id("ConfigForm").onkeydown = () => { if(event.keyCode == 116)return false; };
    $id("uploadfile").onchange = () => { showfilename(); };
    $id("path").value = parent.window.syscfg_info.path_info;
    $id("selectfile").onclick = () => { $id("uploadfile").click(); };
    $id("selectfile").value = parent.window.syscfg_info.path_info1;
    $id("btn_apply").onclick = () => { fwupgrade_confirm(); };
    $id("btn_apply").value = parent.window.str_info.btn_apply;
}
</script>

                  </tr>
               </tbody>
            </table>
        </div>
         <div>
            <table width="100%">

                     <td align="left"><span class="BOLDER"><script>docW(parent.window.fwupdate_info.spn_attention)</script></span></td>
                  </tr>

                     <td align="left"><span class="NORMAL"><script>docW(parent.window.fwupdate_info.spn_note1)</script></span></td>
                  </tr>
               </tbody>
            </table>

      </fieldset>

</body>
