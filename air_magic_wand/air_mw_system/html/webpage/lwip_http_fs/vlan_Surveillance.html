<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<script type="text/javascript">
var surveilCnt = surveilinfo_ds.surveilOuiCount, surveilVid = surveilinfo.vid, surveilPri = surveilinfo.pri;
function docW(a){
  document.write(a);
}
function $id(a){
  return document.getElementById(a);
}
function syncOUI() {
  if ($id("default_desc").value == "3com")
    $id("default_oui").value = "00:E0:BB";
  else if($id("default_desc").value == "cisco")
    $id("default_oui").value = "00:03:6B";
  else if($id("default_desc").value == "veritel")
    $id("default_oui").value = "00:E0:75";
  else if($id("default_desc").value == "pingtel")
    $id("default_oui").value = "00:D0:1E";
  else if($id("default_desc").value == "siemens")
    $id("default_oui").value = "00:01:E3";
  else if($id("default_desc").value == "necphilips")
    $id("default_oui").value = "00:60:B9";
  else if($id("default_desc").value == "huawei3com")
    $id("default_oui").value = "00:0F:E2";
  else if($id("default_desc").value == "avaya")
    $id("default_oui").value = "00:09:6E";
}
function showOuiCfg() {
  if ($id("default_en").checked == true) {
    $id("default_oui").disabled = false;
    $id("default_desc").disabled = false;
    $id("custom_desc").disabled = true;
    $id("custom_oui").disabled = true;
  }
  else if ($id("custom_en").checked == true) {
    $id("default_oui").disabled = true;
    $id("default_desc").disabled = true;
    $id("custom_desc").disabled = false;
    $id("custom_oui").disabled = false;
  }
}
function initSurveil() {
  if (vlanState != 2) {
    alert(parent.window.surv_info.alt_info1); /* "Please enable 802.1Q VLAN first." */
    $id("vlan_sel").disabled = true;
    $id("priority_sel").disabled = true;
    $id("surveil_en").checked = false;
    $id("ouicfg").style.display = "none";
    return;
  }
  if (surveilinfo.state == 0) {
    $id("vlan_sel").disabled = true;
    $id("priority_sel").disabled = true;
    $id("surveil_en").checked = false;
    $id("ouicfg").style.display = "none";
  }
  else {
    $id("vlan_sel").disabled = false;
    $id("priority_sel").disabled = false;
    $id("surveil_en").checked = true;
    $id("ouicfg").style.display = "";
    if (surveilVid != 0) {
      $id("vlan_sel").value = surveilVid;
      $id("priority_sel").value = surveilPri;
    }
  }
  syncOUI();
  showOuiCfg();
}
function chkVlanRange(val, min, max) {
  var input_vid = (typeof val == 'string')? Number(val) : val;
  if (min <= input_vid && input_vid <= max) {
    return true;
  }
  return false;
}
function doSurvApply() {
  var input_state = ($id("surveil_en").checked == true)? 1 : 0;
  var input_vid = Number($id("vlan_sel").value);
  var input_pri = Number($id("priority_sel").value);
  if ((2 != vlanState) && (1 == input_state)) {
    alert(parent.window.surv_info.alt_info1); /* "Please enable 802.1Q VLAN first." */
    return;
  }
  if ((1 != qosMode) && (1 == input_state))
  {
    alert(parent.window.surv_info.alt_info8);/* "Please enable QoS mode to 802.1p first." */
    return;
  }
  if (input_state != surveilinfo.state) {
    return location.href = "surveilvlanSet.cgi?state=" + input_state + "&vid=" + surveilVid + "&pri=" + surveilPri;
  }
  if (1 == input_state) {
    if ((input_vid != surveilVid) || (input_pri != surveilPri)) {
      if (false == chkVlanRange($id("vlan_sel").value, 1, 4094)) {
        alert(parent.window.surv_info.alt_info0); /* "The entered vid does not exist." */
        return;
      }
      if (1 == input_vid) {
        alert(parent.window.surv_info.alt_info6);
        return;
      }
      return location.href = "surveilvlanSet.cgi?state="+ input_state + "&vid=" + input_vid + "&pri=" + input_pri;
    }
  }
}
function chkMacRegex(mac) {
  var regexMac = /^([0-9A-F]{2}[:]){2}([0-9A-F]{2})$/i;
  return regexMac.test(mac);
}
function chkDescRegex(desc) {
  var regexDesc = /^([0-9A-Z_=-]{0,10})$/i;
  return regexDesc.test(desc);
}
function findOuiTblFirstEmptyIdx() {
  var i, j, count = 0;
  for (i = 1; i <= ouiEntryMaxLimit; i++) {
    for (j = 0; j < voiceinfo_ds.voiceOuiCount; j++) {
      if (voiceinfo_ds.oui_info[j].index != i) {
        count++;
      }
    }
    for (j = 0; j < surveilinfo_ds.surveilOuiCount; j++) {
      if (surveilinfo_ds.oui_info[j].index != i) {
        count++;
      }
    }
    if (count == (voiceinfo_ds.voiceOuiCount + surveilinfo_ds.surveilOuiCount)) {
      return i;
    }
    else {
      count = 0;
    }
  }
}
function addOui() {
  var input_oui = "";
  var input_desr = "";
  var convert_oui = "";
  if ($id("vlan_sel").value == '') {
    alert(parent.window.surv_info.alt_info0);
    return;
  }
  if (surveilinfo_ds.surveilOuiCount + voiceinfo_ds.voiceOuiCount >= ouiEntryMaxLimit) {
    alert(parent.window.surv_info.alt_info2); /* "OUI has reached the upper limit of 16 and cannot be added." */
    return;
  }
  if ($id("default_en").checked == true) {
    input_oui = $id("default_oui").value;
    input_desr = $id("default_desc").value;
  }
  else if ($id("custom_en").checked == true) {
    input_oui = $id("custom_oui").value;
    input_desr = $id("custom_desc").value;
  }
  if (false == chkMacRegex(input_oui)) {
    alert(parent.window.surv_info.alt_info3); /* "The OUI format is incorrect, the correct format is 00:AA:BB." */
    return;
  }
  if (false == chkDescRegex(input_desr)) {
    alert(parent.window.surv_info.alt_info7); /* "The OUI description cotains illegal characters. Legal characters are: letters, numbers, dash(-), underscore(_) and equal sign(=)." */
    return;
  }
  convert_oui = input_oui.replace(/:/g, '').toUpperCase();
  for (var i = 0; i < surveilinfo_ds.surveilOuiCount; i++) {
    if (input_oui.toUpperCase() ==  surveilinfo_ds.oui_info[i].oui.toUpperCase()) {
      alert(parent.window.surv_info.alt_info4); /* "The same OUI already exists." */
      return;
    }
  }
  for (var i = 0; i < voiceinfo_ds.voiceOuiCount; i++) {
    if (input_oui.toUpperCase() == voiceinfo_ds.oui_info[i].oui.toUpperCase()) {
      alert(parent.window.surv_info.alt_info4); /* "The same OUI already exists."; */
      return;
    }
  }
  return location.href = "surveilOuiSet.cgi?idx=" + findOuiTblFirstEmptyIdx() + "&oui=" + convert_oui + "&descr=" + input_desr;
}
function delOui() {
  var oui_bmp = 0, count = 0;
  var oui_info = surveilinfo_ds.oui_info;
  for (var i = 0; i < surveilCnt; i++) {
    if (true == $id("oui_" + i).checked) {
      oui_bmp |= (1 << (oui_info[i].index - 1)); /* NOTE: index need used 1-based */
      count++;
    }
  }
  if (0 == count) {
    alert(parent.window.surv_info.alt_info5); /* "Please select the OUI to be deleted first." */
    return;
  }
  return location.href = "surveilOuiDel.cgi?oui_bmp=" + oui_bmp + "&count=" + count;
}
function onlyNum(e) {
  e.target.value = e.target.value.replace(/\D/g,'');
}
window.onload = () => {
  $id("vlan_sel").oninput = (e) => onlyNum(e);
  $id("btn_mode").value = parent.window.str_info.btn_apply;
  $id("btn_mode").onclick = () => doSurvApply();
  $id("default_en").onclick = () => showOuiCfg();
  $id("default_desc").onchange = () => syncOUI();
  $id("custom_en").onclick = () => showOuiCfg();
  $id("btn_add").value = parent.window.vlan_common_info.btn_add;
  $id("btn_add").onclick = () => addOui();
  $id("btn_del").value = parent.window.vlan_common_info.btn_del;
  $id("btn_del").onclick = () => delOui();
  $id("ouicfg").style.display = "none";
  initSurveil();
};
</script>
