<!DOCTYPE html>
<html>
<head>
<!--#portTrunkInfo-->
<script>
<!--#poeCfg-->
</script>
<style>
body,input,select {
    color: <!--#subPageFont-->; /* Subpage font color */
}
fieldset {
  font-size: 12px;
  width: 1300px;
  margin: 1em auto;
  padding: 1em;
  border: 1px solid <!--#subPgFcGrpBdr-->; /* Subpage function group border color */
}

  font-size: 150%;

}

}

}

}

}

}
table .TD_FIRST_COL {
  background-color: <!--#subPageThdBkGd-->; /* Subpage table header background color */
  padding: 0 5px;
  font-size: 150%;

}

  margin-top: 12px;

}

    background: url(button.gif) right -42px;

}
INPUT.BTN_NORMAL_BTN {
    font-family: "Arial";
    width: 60px;
}
input.TEXT_ENABLE {
    font-family: "Arial";

}
.SELECT_PORTLIST {

}
.SELECT_WIDTH {
    font-size: 150%;
    font-family: "Arial";
    height: 32px;
    width: 140px;
}
.SELECT_NORMAL {
    font-size: 150%;
    font-family: "Arial";
    height: 32px;

}

    width: 100%;

}

}

}
input {
  border-width: 1px;

}

<meta name="referrer" content="no-referrer">
<script>
var docW = (a) => document.write(a), $ = (a) => document.getElementById(a), setT = (e,t) => e.innerText = t, setHTML = (e,t) => e.innerHTML = t,
  checkfloat = (v) => (parseFloat(v) == v), watt2float = (v) => v / 10, voltAmp2float = (v) => v / 100,
  incMeta = () => docW('<meta http-equiv="Content-Type" content="text/html; charset=' + ((0 == top.g_Lan) ? "gb2312" : "utf-8") + '">');
var selState = new Array(poe_cfg.max_poe_port), s_info = parent.window.poe_info, poe_stats = {};
var s_pw_ctrl = [s_info.disable, s_info.enable],
  s_pw_pri = [s_info.pw_pri1, s_info.pw_pri2, s_info.pw_pri3],
  s_pw_mode = [s_info.poe_mode1, s_info.poe_mode2],
  s_pw_status = [s_info.off, s_info.on],
  s_pw_event = [s_info.pw_event1, s_info.pw_event2, s_info.pw_event3, s_info.pw_event4, s_info.pw_event5, s_info.pw_event6,
                s_info.pw_event7, s_info.pw_event8, s_info.pw_event9, s_info.pw_event10, s_info.pw_event11];
var trunk_port = ["", " (Trunk1)", " (Trunk2)", " (Trunk3)", " (Trunk4)"];
var original_pw_avail = '';

function resetPs() {
  let ps = $("poe_portset");
  ps.pw_ctrl.value = -1;
  ps.pw_pri.value = -1;
  ps.pw_mode.value = -1;
  ps.delay_time.value = '';
  ps.pw_avail_pwr_mode.value = -1;
  ps.pw_avail.value = '';
  ps.pw_avail.max = watt2float(poe_cfg.max_port_at_wat);
}

function initPage() {
  let ps = $("poe_portset");
  for (let i = 0; i < selState.length; ++i) {
    selState[i] = !1;
  }
  $("pw_total_avail").value = watt2float(poe_cfg.avail_wat);
  $("pw_total_avail").max = watt2float(poe_cfg.max_avail_wat);
  ps.delay_time.max = poe_cfg.max_delay_time;
  ps.pw_avail.max = watt2float(poe_cfg.max_port_at_wat);
  resetPs();
}

function initPageLang() {
  let ps = $("poe_portset");

  setT($("lgd_poe"), s_info.lgd_poe);
  setT($("spn_total_avail"), s_info.total_avail_wat);
  setT($("spn_total_avail_unit"), s_info.s_watt_unit);
  setT($("spn_total_watt"), s_info.total_watt);
  setT($("spn_total_watt_unit"), s_info.s_watt_unit);
  setT($("spn_sup_volt"), s_info.sup_volt);
  setT($("spn_sup_volt_unit"), s_info.s_volt_unit);
  setT($("spn_total_cur_amp"), s_info.total_cur_amp);
  setT($("spn_total_cur_amp_unit"), s_info.s_amp_unit);

  setT($("lgd_port_set"), s_info.lgd_poe_port_set);
  setT($("tb1_port"), s_info.port);
  setT($("tb1_pw_ctrl"), s_info.pw_ctrl);
  setT($("tb1_pw_pri"), s_info.pw_pri);
  setT($("tb1_pw_mode"), s_info.poe_mode);
  setT($("tb1_delay_time"), s_info.delay_time);
  setT($("tb1_pw_avail"), s_info.pw_avail_pw);

  setT($("tb2_port"), s_info.port);
  setT($("tb2_pw_ctrl"), s_info.pw_ctrl);
  setT($("tb2_pw_pri"), s_info.pw_pri);
  setT($("tb2_pw_mode"), s_info.poe_mode);
  setT($("tb2_delay_time"), s_info.delay_time);
  setT($("tb2_pw_status"), s_info.pw_status);
  setT($("tb2_pd_class"), s_info.pd_class);
  setT($("tb2_pw_wat"), s_info.wat_unit);
  setT($("tb2_pw_avail"), s_info.pw_avail);
  setT($("tb2_pw_cons"), s_info.pw_cons);
  setT($("tb2_pw_volt"), s_info.volt_unit);
  setT($("tb2_pw_cur_amp"), s_info.amp_unit);
  setT($("tb2_pw_event"), s_info.pw_event);
  $("submitBtn1").value = s_info.btn_apply;
  $("submitBtn1").onclick = () => { return do_submit1(); };
  $("submitBtn2").value = s_info.btn_apply;
  $("submitBtn2").onclick = () => { return do_submit2(); };
  $("portSel").onclick = (event) => { return chkSel(event); };
  $("pw_avail_pwr_mode").onchange = () => { return chk_awail_pw_en(); };

  setT(ps.pw_ctrl.children[0], s_info.disable);
  setT(ps.pw_ctrl.children[1], s_info.enable);
  setT(ps.pw_pri.children[0], s_info.pw_pri1);
  setT(ps.pw_pri.children[1], s_info.pw_pri2);
  setT(ps.pw_pri.children[2], s_info.pw_pri3);
  setT(ps.pw_mode.children[0], s_info.poe_mode1);
  setT(ps.pw_mode.children[1], s_info.poe_mode2);
  setT(ps.pw_avail_pwr_mode.children[0], s_info.pw_class_defined);
  setT(ps.pw_avail_pwr_mode.children[1], s_info.pw_self_defined);

  //debug
  console.log("poe_cfg:");
  console.log(poe_cfg);
}

function updatePs(xmlRsp) {
  let p_stats = xmlRsp.split(";");
  let g_stats = p_stats[0].split(",");

  poe_stats = {pw_status: [], pd_class: [], pw_wat: [], pw_volt: [], pw_cur_amp: [], pw_event: []};

  poe_stats.sup_volt = parseInt(g_stats[0]);
  poe_stats.total_wat = parseInt(g_stats[1]);
  poe_stats.cur_amp = parseInt(g_stats[2]);
  poe_stats.max_amp = (poe_stats.sup_volt != 0)?
    ((watt2float(poe_cfg.avail_wat)) * 1000 / (voltAmp2float(poe_stats.sup_volt))).toFixed(1): 0;

  p_stats.shift();
  let p_cfg = p_stats[0].split(",");
  poe_cfg.pw_ctrl = [];
  for (let i = 0; i < selState.length; ++i) {
    poe_cfg.pw_ctrl.push(parseInt(p_cfg[i]));
  }

  p_stats.shift();
  for (let i = 0; i < selState.length; ++i) {
    let e = p_stats[i].split(",");
    poe_stats.pw_status.push(parseInt(e[0]));
    poe_stats.pd_class.push(parseInt(e[1]));
    poe_stats.pw_wat.push(parseInt(e[2]));
    poe_stats.pw_volt.push(parseInt(e[3]));
    poe_stats.pw_cur_amp.push(parseInt(e[4]));
    poe_stats.pw_event.push(parseInt(e[5]));
  };
  setHTML($("spn_total_watt_val"), watt2float(poe_stats.total_wat));
  setHTML($("spn_sup_volt_val"), voltAmp2float(poe_stats.sup_volt));
  setHTML($("spn_total_cur_amp_val"), poe_stats.cur_amp);
  setHTML($("spn_total_max_avail"), s_info.total_max_avail.replace("--", poe_cfg.max_avail_wat));
  setHTML($("spn_total_max_amp"), s_info.total_max_amp.replace("--", poe_stats.max_amp));
  //debug
  console.log("poe_cfg.pw_ctrl:");
  console.log(poe_cfg.pw_ctrl);
  console.log("poe_stats:");
  console.log(poe_stats);
}

function initPsTbl() {
  var ps = $("tb_portSet");
  for (let i = 0; i < selState.length; ++i) {
    // only display port with poe functionality
    if (!(poe_cfg.is_poe_port & (1 << i)))
    {
      continue;
    }
    let t = _trunk_info[i];
    ps.innerHTML += "<tr><td width='7%'><span class='NORMAL'>" +
      ((s_info.port + (i + 1)) + trunk_port[t].replace("Trunk", parent.window.trunk_info.opt_trunk)) +
      "</span></td><td><span class='NORMAL' id='pcctrl_" + i + "'>" + (s_pw_ctrl[poe_cfg.pw_ctrl[i]]) +
      "</span></td><td class='COL_PW_PRI'><span class='NORMAL'>" + (s_pw_pri[poe_cfg.pw_pri[i]]) +
      "</span></td><td><span class='NORMAL'>" + (s_pw_mode[poe_cfg.pw_mode[i]]) +
      "</span></td><td class='COL_DELAY_TIME'><span class='NORMAL'>" +
      ((poe_cfg.delay_time[i] != 0xFF) ? poe_cfg.delay_time[i] : "") +
      "</span></td><td><span class='NORMAL' id='psst_" + i + "'>" + (s_pw_status[poe_stats.pw_status[i]]) +
      "</span></td><td><span class='NORMAL' id='pspd_" + i + "'>" + ((poe_stats.pd_class[i] != 5) ? ((poe_cfg.pw_mode[i] == 0 && poe_stats.pd_class[i] == 4) ? 0 : poe_stats.pd_class[i]) : s_info.pd_class_unknow) +
      "</span></td><td><span class='NORMAL'>" + (poe_cfg.pw_avail_mode[i] == 1 ? (watt2float(poe_cfg.pw_avail_wat[i])) : s_info.pw_class_defined) +
      "</span></td><td><span class='NORMAL' id='pscs_" + i + "'>" + watt2float(poe_stats.pw_wat[i]) +
      "</span></td><td><span class='NORMAL' id='psvlt_" + i + "'>" + voltAmp2float(poe_stats.pw_volt[i]) +
      "</span></td><td><span class='NORMAL' id='psamp_" + i + "'>" + voltAmp2float(poe_stats.pw_cur_amp[i]) +
      "</span></td><td><span class='NORMAL' id='psevt_" + i + "'>" + (s_pw_event[poe_stats.pw_event[i]]) +
      "</span></td></tr>";
  }
}

function updatePsTbl() {
  for (let i = 0; i < selState.length; ++i) {
    if (!(poe_cfg.is_poe_port & (1 << i)))
    {
      continue;
    }
    setHTML($("pcctrl_" + i ), s_pw_ctrl[poe_cfg.pw_ctrl[i]]);
    setHTML($("psst_" + i ), s_pw_status[poe_stats.pw_status[i]]);
    setHTML($("pspd_" + i ), ((poe_stats.pd_class[i] != 5) ? poe_stats.pd_class[i] : s_info.pd_class_unknow));
    setHTML($("pscs_" + i ), watt2float(poe_stats.pw_wat[i]));
    setHTML($("psvlt_" + i ), voltAmp2float(poe_stats.pw_volt[i]));
    setHTML($("psamp_" + i ), voltAmp2float(poe_stats.pw_cur_amp[i]));
    setHTML($("psevt_" + i ), s_pw_event[poe_stats.pw_event[i]]);
  }
}

function getSelNum() {
  var t = 0;
  selState.forEach((e) => {
    if (e) ++t;
  });
  return t;
}

function chkSel(event) {
  let ps_opts = $("portSel").options;
  let ps_len = ps_opts.length;
  let ps_idx = 0;
  let ps = $("poe_portset");

  for (ps_idx = 0; ps_idx < ps_len; ++ps_idx) {
    let port = parseInt(ps_opts[ps_idx].value, 10);
    selState[port] = ps_opts[ps_idx].selected;
  }
  if (1 == getSelNum()) {
    let port = selState.findIndex(e => e);
    if (port >= 0) {
      ps.pw_ctrl.value = poe_cfg.pw_ctrl[port];
      ps.pw_pri.value = poe_cfg.pw_pri[port];
      ps.pw_mode.value = poe_cfg.pw_mode[port];
      ps.delay_time.value = (poe_cfg.delay_time[port] != 0xFF) ? poe_cfg.delay_time[port] : '';
      ps.pw_avail_pwr_mode.value = poe_cfg.pw_avail_mode[port];
      ps.pw_avail.value = watt2float(poe_cfg.pw_avail_wat[port]);
      (ps.pw_mode.value == 0) && (ps.pw_avail.max = watt2float(poe_cfg.max_port_af_wat));
    }
  } else {
    resetPs();
  }
  original_pw_avail = ps.pw_avail.value;
  chk_awail_pw_en();
}

function activeAllInput(en) {
  let ps = $("poe_portset"), setEn = (el) => el.disabled = !en;
  setEn($("submitBtn1"));
  setEn($("submitBtn2"));
  setEn($("portSel"));
  setEn(ps.pw_ctrl);
  setEn(ps.pw_pri);
  setEn(ps.pw_mode);
  setEn(ps.delay_time);
  setEn(ps.pw_avail_pwr_mode);
  setEn(ps.pw_avail);
}

function do_submit1() {
  let avail_wat = $("pw_total_avail").value;
  if (avail_wat === poe_cfg.avail_wat) {
    return (alert(parent.window.str_info.alt_nochange), !1);
  } else if (!checkfloat(avail_wat) || (avail_wat > (watt2float(poe_cfg.max_avail_wat))) || (avail_wat < 0)) {
    return (alert(s_info.alt_info1.replace("--", watt2float(poe_cfg.max_avail_wat))), !1);
  }
  return (activeAllInput(!1), location.href = "poeSetting.cgi?avail_wat=" + (parseFloat(avail_wat) * 10));
}

function getPortBmp() {
  var p = 0;
  selState.forEach((e, i) => {
    if (e) p |= (1 << i);
  });
  return p;
}

function checkAvailPwr() {
  let ps = $("poe_portset"), i = 0, ps_pw_mode = ps.pw_mode.value, ps_pw_avail = ps.pw_avail.value;
  let max_port_wat = watt2float(poe_cfg.max_port_at_wat), valid = !0;

  for (i = 0; i < selState.length; ++i) {
    if (selState[i]) {
      let pw_mode = (ps_pw_mode != '')? ps_pw_mode: poe_cfg.pw_mode[i];
      if (pw_mode == 0) {
        max_port_wat = watt2float(poe_cfg.max_port_af_wat);
        break;
      }
    }
  }
  for (i = 0; i < selState.length; ++i) {
    if (selState[i]) {
      let pw_avail = (ps_pw_avail != '' && ps.pw_avail_pwr_mode.value)? ps_pw_avail : (watt2float(poe_cfg.pw_avail_wat[i]));
      if ((ps.pw_avail_pwr_mode.value == 1) && ((parseFloat(pw_avail) != pw_avail) || (pw_avail > max_port_wat) || (pw_avail < 0))) {
        return (alert(s_info.alt_info4.replace("--", max_port_wat), !1));
      }
    }
  }
  return !0;
}

function chk_awail_pw_en() {
    let ps = $("poe_portset");
    ps.pw_avail.disabled = ((ps.pw_avail_pwr_mode.value == 0) ? true : false);
    ps.pw_avail.value = ((ps.pw_avail_pwr_mode.value == 0) ? '' : original_pw_avail);
}

function do_submit2() {
  let ps = $("poe_portset");

  if (getSelNum() == 0) {
    return (alert(s_info.alt_info2), !1);
  } else if ((ps.delay_time.value != '') && (!checkfloat(ps.delay_time.value) || (ps.delay_time.value > poe_cfg.max_delay_time) || (ps.delay_time.value < 0))) {
    return (alert(s_info.alt_info3.replace("--", poe_cfg.max_delay_time)), !1);
  } else if (!checkAvailPwr()) {
    return !1;
  }

  let req = "poePortSetting.cgi?pbmp=" + getPortBmp(), valid = !1;
  let addParam = (c, p) => { if (c.value != '') { req += p; valid = !0; } };

  addParam(ps.pw_ctrl, "&pw_ctrl=" + ps.pw_ctrl.value);
  addParam(ps.pw_pri, "&pw_pri=" + ps.pw_pri.value);
  addParam(ps.pw_mode, "&pw_mode=" + ps.pw_mode.value);
  addParam(ps.delay_time, "&delay_time=" + parseInt(ps.delay_time.value));
  addParam(ps.pw_avail_pwr_mode, "&pw_avail_mode=" + ps.pw_avail_pwr_mode.value);
  addParam(ps.pw_avail, "&pw_avail=" + (parseFloat(ps.pw_avail.value) * 10));
  return (valid)? (activeAllInput(!1), location.href = req) : (alert(parent.window.str_info.alt_nochange), !1);
}

function getPsData(init) {
  var xhr = parent.getXMLObject();
  if (!!xhr) {
    if (init == true) {
      xhr.onreadystatechange = function() {
        if ((this.readyState == 4) && (this.status == 200)) {
          updatePs(this.responseText), initPsTbl();
          applyPoeModeUi();
          setTimeout(getPsData, 5000, false);
        }
      };
    } else {
      xhr.onreadystatechange = function() {
        if ((this.readyState == 4) && (this.status == 200)) {
          updatePs(this.responseText), updatePsTbl();
          setTimeout(getPsData, 5000, false);
        }
      };
    }
    xhr.open("GET", "/poeState.xml", true);
    xhr.send();
  }
}

function togglePwPriVisible(show) {
  var display = show ? "" : "none";
  var cells = document.getElementsByClassName("COL_PW_PRI");

  $("tb1_pw_pri").style.display = display;
  $("tb2_pw_pri").style.display = display;
  $("td1_pw_pri").style.display = display;
  for (let i = 0; i < cells.length; i++)
  {
    cells[i].style.display = display;
  }
}

function toggleDelayTimeColumn(show) {
  var display = show ? "" : "none";
  var cells = document.getElementsByClassName("COL_DELAY_TIME");

  $("tb1_delay_time").style.display = display;
  $("tb2_delay_time").style.display = display;
  $("td1_delay_time").style.display = display;
  for (let i = 0; i < cells.length; i++)
  {
    cells[i].style.display = display;
  }
}

function applyPoeModeUi() {
  var isSwMode = (poe_cfg.poe_power_strategy == 1);

  togglePwPriVisible(isSwMode);
  toggleDelayTimeColumn(false);  /* Currently not support power delay time */
}
incMeta();
</script>
</head>
<body marginwidth="0" marginheight="0">
<fieldset>
<legend><span class="NORMAL" id="lgd_poe"></span></legend>
<form name="poe_set">
  <table width="100%">
    <tbody>
      <tr>
        <td width="20%" align="left">
          <span class="NORMAL" id="spn_total_avail"></span></td>
        <td width="10%" align="left">
          <input class="TEXT_ENABLE" id="pw_total_avail" type="number" step="0.1" min="0" />
        <td width="5%" align="left">
          <span class="NORMAL" id="spn_total_avail_unit"></span></td>
        <td align="left">
          <span class="NORMAL" id="spn_total_max_avail"></span></td>
      </tr>
      <tr>
        <td align="left">
          <span class="NORMAL" id="spn_total_watt"></span></td>
        <td align="left">
          <span class="NORMAL" id="spn_total_watt_val"></span></td>
        <td align="left">
          <span class="NORMAL" id="spn_total_watt_unit"></span></td>
      </tr>
      <tr>
        <td align="left">
          <span class="NORMAL" id="spn_sup_volt"></span></td>
        <td align="left">
          <span class="NORMAL" id="spn_sup_volt_val"></span></td>
        <td align="left">
          <span class="NORMAL" id="spn_sup_volt_unit"></span></td>
      </tr>
      <tr>
        <td align="left">
          <span class="NORMAL" id="spn_total_cur_amp"></span></td>
        <td align="left">
          <span class="NORMAL" id="spn_total_cur_amp_val"></span></td>
        <td align="left">
          <span class="NORMAL" id="spn_total_cur_amp_unit"></span></td>
        <td align="left">
          <span class="NORMAL" id="spn_total_max_amp"></span></td>
      </tr>
    </tbody>
  </table>
  <table class="BTN_WRAPPER" align="center">
    <tbody>
      <tr>
        <td class="BTN_WRAPPER">
          <a class="BTN"><input id="submitBtn1" class="BTN_NORMAL_BTN" type="button" /></a></td>
      </tr>
    </tbody>
  </table>
</form>
</fieldset>
<fieldset>
<legend><span class="NORMAL" id="lgd_port_set"></span></legend>
<form id="poe_portset">
  <table class="BORDER" width="70%">
    <tbody>
      <tr class="TABLE_HEAD">
        <td id="tb1_port" class="TD_FIRST_COL" width="15%"></td>
        <td id="tb1_pw_ctrl" class="TD_FIRST_COL" width="14%"></td>
