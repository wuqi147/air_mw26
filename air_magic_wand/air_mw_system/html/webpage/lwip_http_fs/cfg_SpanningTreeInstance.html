function expandRanges(input) {
    return input
        .split(',')
        .flatMap(part => {
            if (part.includes('-')) {
                let [start, end] = part.split('-').map(Number);
                return Array.from({ length: end - start + 1 }, (_, i) => start + i);
            } else {
                return [Number(part)];
            }
        });
}

function compactRanges(arr) {
    arr.sort((a, b) => a - b);
    let result = [];
    let start = arr[0];
    let end = arr[0];

    for (let i = 1; i <= arr.length; i++) {
        if (arr[i] == end + 1) {
            end = arr[i];
        } else {
            if (start == end) {
                result.push(start.toString());
            } else {
                result.push(start + '-' + end);
            }
            start = arr[i];
            end = arr[i];
        }
    }
    return result.join(',');
}

function getSelNum() {
    var t = 0;
    selState.forEach((e) => { if (e) ++t; });
    return t;
}

function chkSel(e) {
    var ins;
    let portSel_options = $("portSel").options;
    let portSel_length = portSel_options.length;
    let ps = $("spanning_tree_ins_portset");
    let stp_ins_portSet = $("spanning_tree_ins_portset");

    for (let i = 0; i < max_mstp_ins_num; i++) {
        if (local_instance[i] == stp_ins_portSet.sel_ins.value) {
            ins = i;
        }
    }

    for (let portSel_index = 0; portSel_index < portSel_length; ++portSel_index) {
        selState[portSel_index] = portSel_options[portSel_index].selected;
    }

    let i = selState.indexOf(true);
    let portSel_index = parent.window.g_getPort(g_pbmp[i]);
    if (portSel_index >= 0) {
        ps.portPriority.value = port_pri[portSel_index];
        ps.portCost.value = port_cost[portSel_index];
        if (stp_ds.autoCostSupport != 0)
        {
            if (stp_ds.autoCostEnable[portSel_index] != 0) {
                $id("portCost").disabled = true;
            }
            else {
                $id("portCost").disabled = false;
            }
        }
    }
}

function chkRange(val, min, max) {
    let valid = false;
    if ((min <= val) && (max >= val)) {
        valid = true;
    }
    return valid;
}

function chkRegionName() {
    let val = $("stp_region_name").value;
    let string_check = /^[A-Za-z0-9!"#$%&'()*+,\-./:;<=>?@^_`{|}~]+$/.test($("stp_region_name").value);

    if (val == "") {
        $("div_region_name").style.display = "block";
    } else if (string_check == false) {
        $("div_region_name").style.display = "block";
    } else {
        $("div_region_name").style.display = "none";
    }
}

function chkRevision() {
    let val = $("stp_revision").value;
    if (!chkRange(val, 0, 65535) || val == "") {
        $("div_revision").style.display = "block";
    } else {
        $("div_revision").style.display = "none";
    }
}

function chkInstance() {
    let val = $("stp_ins").value;
    if (!chkRange(val, 1, 4095) || val == "") {
        $("div_ins").style.display = "block";
    } else {
        $("div_ins").style.display = "none";
    }
}

function chkPriority() {
    let val = $("stp_priority").value;
    if (!chkRange(val, 0, 61440) || val == "") {
        $("div_priority").style.display = "block";
    } else if ((val % 4096) != 0) {
        $("div_priority").style.display = "block";
    } else {
        $("div_priority").style.display = "none";
    }
}

function arraysAreIdentical(arr1, arr2) {
    if (arr1.length != arr2.length) return false;
    for (let i = 0; i < arr1.length; i++) {
        if (arr1[i] != arr2[i]) return false;
    }
    return true;
}

function chkVlanId() {
    let r = $("stp_vlan_id").value;
    vlan_is_valid = 1;
    if (r.length == 0 || r.length > 160) {
        $("div_vlan_id").style.display = "block";
        vlan_is_valid = 0;
        return false;
    }

    let str = r.replace(/-/gi, ",");
    let vlan_id_array = str.split(",");
    let output = expandRanges($("stp_vlan_id").value).join(',');
    let total_vlan_id_array = output.split(",");
    let instance_edit_vlan = [];

    if (local_instance.indexOf(parseInt($("stp_ins").value, 10)) != -1) {
        let ind = local_instance.indexOf(parseInt($("stp_ins").value, 10));
        instance_edit_vlan = expandRanges(local_vlan_id[ind]);
        ori_vlan_before_add = local_vlan_id[ind];
    }

    to_remove = [];

    for (let i = 0; i < vlan_id_array.length; i++) {
        if (!/^[0-9]{1,4}$/.test(vlan_id_array[i])) {
            $("div_vlan_id").style.display = "block";
            vlan_is_valid = 0;
            return;
        }

        if (parseInt(vlan_id_array[i], 10) < 1 || parseInt(vlan_id_array[i], 10) > 4094) {
            $("div_vlan_id").style.display = "block";
            vlan_is_valid = 0;
            return;
        }

        if (i >= 1 && parseInt(vlan_id_array[i - 1]) >= parseInt(vlan_id_array[i])) {
            $("div_vlan_id").style.display = "block";
            vlan_is_valid = 0;
            return;
        }
    }

    for (let i = 0; i < total_vlan_id_array.length; i++) {
        var tmp_vlan_id = parseInt(total_vlan_id_array[i], 10);
        to_remove.push(tmp_vlan_id);
        if (instance_0_vlan.indexOf(tmp_vlan_id) == -1) {
            if (instance_edit_vlan.length > 0 && instance_edit_vlan.indexOf(tmp_vlan_id) != -1) {
                continue;
            }
            $("div_vlan_id").style.display = "block";
            vlan_is_valid = 0;
            return 1;
        }
    }

    if (arraysAreIdentical(to_remove, instance_0_vlan)) {
        $("div_vlan_id").style.display = "block";
        vlan_is_valid = 0;
        return 1;
    }

    $("div_vlan_id").style.display = "none";
    return;
}

function addParam(cnt, req, p) {
    if (cnt > 0) {
        req += "&";
    }
    req += p;
    return req;
}

function chkMultiple(val, multiple) {
    return (val % multiple) == 0;
}

function modifyselectedbit() {
    del_bit = 0;
    local_instance.forEach((e, k) => {
        if ($id("ins_" + k).checked == true) {
            del_bit |= 1 << ($id("ins_" + k).value);
        } else {
            del_bit &= ~(1 << ($id("ins_" + k).value));
        }
    });
}

function delInstance() {
    var idx_to_del = [];
    local_instance.forEach((e, k) => {
        if ($id("ins_" + k).checked == true) {
            idx_to_del.push(k);
        }
    });

    to_add = [];
    for (let i = idx_to_del.length - 1; i >= 0; i--) {
        let output = expandRanges(local_vlan_id[idx_to_del[i]]).join(',');
        let total_vlan_id_array = output.split(",");
        for (let j = 0; j < total_vlan_id_array.length; j++) {
            let tmp_vlan_id = parseInt(total_vlan_id_array[j], 10);
            if (tmp_vlan_id != 0) {
                to_add.push(tmp_vlan_id);
            }
        }

        local_instance.splice(idx_to_del[i], 1);
        local_priority.splice(idx_to_del[i], 1);
        local_vlan_id.splice(idx_to_del[i], 1);
    }

    let arr = expandRanges(local_vlan_id[0]).concat(to_add);
    let output = compactRanges(arr);
    local_vlan_id[0] = output;
    instance_0_vlan = expandRanges(local_vlan_id[0]);

    initPsTbl();
}

function do_add1() {
    if (
        $("stp_ins").value == "" ||
        $("stp_priority").value == "" ||
        $("stp_vlan_id").value == ""
    ) {
        return false;
    }

    var is_edit = 0;
    var ori_vlan_id_0 = local_vlan_id[0];
    var ori_pri_to_edit;
    var ori_vlan_id_to_edit;
    var ind;

    if (ori_vlan_before_add != undefined && vlan_is_valid == 0) {
        $("stp_vlan_id").value = ori_vlan_before_add;
    }

    if (local_instance.indexOf(parseInt($("stp_ins").value, 10)) != -1) {
        is_edit = 1;
        ind = local_instance.indexOf(parseInt($("stp_ins").value, 10));

        // put vlan id back to vlan id of instance 0
        to_add = [];
        let tmp_output = expandRanges(local_vlan_id[ind]).join(',');
        let total_vlan_id_array = tmp_output.split(",");
        for (let i = 0; i < total_vlan_id_array.length; i++) {
            to_add.push(parseInt(total_vlan_id_array[i], 10));
        }

        let tmp_arr = expandRanges(local_vlan_id[0]).concat(to_add);
        tmp_arr = tmp_arr.filter(num => num !== 0);
        let vlan_str = compactRanges(tmp_arr);
        local_vlan_id[0] = vlan_str;
        instance_0_vlan = expandRanges(local_vlan_id[0]);

        ori_pri_to_edit = local_priority[ind];
        ori_vlan_id_to_edit = local_vlan_id[ind];

        // adjust local array
        local_priority[ind] = parseInt($("stp_priority").value, 10);
        local_vlan_id[ind] = $("stp_vlan_id").value;
    }

    chkInstance();
    chkPriority();
    chkVlanId();

    if (
        $("div_ins").style.display == "block" ||
        $("div_vlan_id").style.display == "block" ||
        $("div_priority").style.display == "block"
    ) {
        if (is_edit == 1) {
            // restore
            local_vlan_id[0] = ori_vlan_id_0;
            instance_0_vlan = expandRanges(local_vlan_id[0]);
            local_priority[ind] = ori_pri_to_edit;
            local_vlan_id[ind] = ori_vlan_id_to_edit;
        }
        return false;
    }

    if (is_edit == 0 && local_instance.length >= max_mstp_ins_num) {
        alert(s_info.max_instance_count_reached);
        return 1;
    }

    let arr = expandRanges(local_vlan_id[0]).filter(n => !to_remove.includes(n));
    let output = compactRanges(arr);
    local_vlan_id[0] = output;
    instance_0_vlan = expandRanges(local_vlan_id[0]);

    if (is_edit == 0) {
        local_instance.push(parseInt($("stp_ins").value, 10));
        local_priority.push(parseInt($("stp_priority").value, 10));
        local_vlan_id.push($("stp_vlan_id").value);
    }

    initPsTbl();
}

function do_submit1() {
    if (
        $("div_revision").style.display == "block" ||
        $("div_region_name").style.display == "block"
    ) {
        return false;
    }

    if (
        $("stp_region_name").value == "" ||
        $("stp_revision").value == ""
    ) {
        return false;
    }

    let cnt = 0;
    let req = "stpRegCfg.cgi?";

    req = addParam(cnt++, req, "region=" + $("stp_region_name").value);
    req = addParam(cnt++, req, "revision=" + $("stp_revision").value);

    return location.href = req;
}

function do_submit2() {
    let cnt = 0;
    let req = "stpInsCfg.cgi?";

    let ins_array = "";
    let pri_array = "";
    let vlan_id_array = "";

    local_instance.forEach((e, k) => {
        ins_array += (e | k << 12);
        ins_array += ",";

        pri_array += local_priority[k];
        pri_array += ",";

        vlan_id_array += '"' + local_vlan_id[k] + '"';
        vlan_id_array += ",";
    });

    req = addParam(cnt++, req, "ins=" + ins_array);
    req = addParam(cnt++, req, "pri=" + pri_array);
    req = addParam(cnt++, req, "vlan_id=" + vlan_id_array);

    return location.href = req;
}

function getPortBmp() {
    var p = 0;
    selState.forEach((e, i) => { if (e) p |= g_pbmp[i]; });
    return p;
}

function do_submit3() {
    let ps = $("spanning_tree_ins_portset");
    let req = "stpInsPortCfg.cgi?pbmp=" + getPortBmp();
    let cnt = 1;
    if (getSelNum() == 0) {
        alert(s_info.alt_info1);
        return false;
    }
    if (!chkRange(ps.portPriority.value, 0, 240) || ps.portPriority.value == "") {
        alert(parent.window.spanningTree_info.alt_port_priority);
        return false;
    }
    if (!chkMultiple(ps.portPriority.value, 16)) {
        alert(parent.window.spanningTree_info.alt_priority_multiple + "16");
        return false;
    }

    for (let i = 0; i < max_mstp_ins_num; i++) {
        if (local_instance[i] == ps.sel_ins.value) {
            req = addParam(cnt++, req, "ins=" + i);
        }
    }

    req = addParam(cnt++, req, "portPriority=" + ps.portPriority.value);
    if (ps.portCost.value == "") {
        req = addParam(cnt++, req, "cost=0");
    } else {
        req = addParam(cnt++, req, "cost=" + ps.portCost.value);
    }

    return location.href = req;
}

function do_submit4() {
    let ps = $("spanning_tree_ins_portset");
    let req = "stpInsPortCfg.cgi?pbmp=" + getPortBmp();
    let cnt = 1;

    if (ps.sel_ins.value == "") {
        req = addParam(cnt++, req, "ins=" + 0);
    } else {
        for (let i = 0; i < max_mstp_ins_num; i++) {
            if (local_instance[i] == ps.sel_ins.value) {
                req = addParam(cnt++, req, "ins=" + i);
            }
        }
    }

    sel_ins_index = parseInt(ps.sel_ins.value, 10);

    return location.href = req;
}

function state_change() {
    if ((XML_SEND_COMPLETE == xmlReq.readyState) && (HTML_STATUS_OK == xmlReq.status)) {
        var ps = $("tb_portSet_2");
        let stp_ins_portSet = $("spanning_tree_ins_portset");
        let portSel_options = $("portSel").options;
        let portSel_length = portSel_options.length;

        var stp_instance_port_cost = xmlReq.responseText.split(";");
        sel_ins_index = parseInt(stp_instance_port_cost[0], 10);
        port_cost = stp_instance_port_cost[1].split(",");
        port_pri = stp_instance_port_cost[2].split(",");

        console.log("Receive XML!, sel_ins_index = %s", sel_ins_index);
        console.log("Receive XML!, port_cost = %s", port_cost);

        stp_ins_portSet.sel_ins.options[sel_ins_index].selected = true;
        hideInvalidPort();

        // Table header
        ps.innerHTML = "";
        ps.innerHTML += "<tr>" +
            "<td><span class='NORMAL'>" + s_info.port + "</span></td>" +
            "<td><span class='NORMAL'>" + s_info.port_priority + "</span></td>" +
            "<td><span class='NORMAL'>" + s_info.port_cost + "</span></td>" +
            "<td><span class='NORMAL'>" + s_info.port_state + "</span></td>" +
            "<td><span class='NORMAL'>" + s_info.port_role + "</span></td>" +
            "</tr>";

        for (let i = 0; i < max_mstp_ins_num; i++) {
            if (local_instance[i] == stp_ins_portSet.sel_ins.value) {
                g_plist.forEach((e, k) => {
                    j = parent.window.g_getPort(e);
                    if (stp_ds.portStatus[j] != 0) {
                        ps.innerHTML += "<tr>" +
                            "<td><span class='NORMAL'>" + ((k.indexOf("Trunk") < 0) ? (s_info.port + k): (k.replace("Trunk", parent.window.trunk_info.opt_trunk))) + "</span></td>" +
                            "<td><span class='NORMAL'>" + port_pri[j] + "</span></td>" +
                            "<td><span class='NORMAL'>" + port_cost[j] + "</span></td>" +
                            "<td><span class='NORMAL'>" +
                            (
                                (port_role[i][j] != 5 && port_role[i][j] != 4 && port_role[i][j] != 3 && port_role[i][j] != 2 && port_role[i][j] != 1)? s_info.disable :
                                ((port_state[i][j] == 6) ? s_info.port_state_guard_down :
                                (port_state[i][j] == 5) ? s_info.port_state_loop_inc :
                                (port_state[i][j] == 4) ? s_info.port_state_root_inc :
                                (port_state[i][j] == 3) ? s_info.port_state_discard :
                                (port_state[i][j] == 2) ? s_info.port_state_forward :
                                (port_state[i][j] == 1) ? s_info.port_state_learn :
                                s_info.disable)
                            ) +
                            "</span></td>" +
                            "<td width='20%'><span class='NORMAL'>" +
                            (
                                (port_role[i][j] == 5) ? s_info.port_role_master :
                                (port_role[i][j] == 4) ? s_info.port_role_backup :
                                (port_role[i][j] == 3) ? s_info.port_role_alternate :
                                (port_role[i][j] == 2) ? s_info.port_role_designated :
                                (port_role[i][j] == 1) ? s_info.port_role_root :
                                s_info.disable
                            ) +
                            "</span></td></tr>";
                    } else {
                        ps.innerHTML += "<tr>" +
                            "<td><span class='NORMAL'>" + ((k.indexOf("Trunk") < 0) ? (s_info.port + k): (k.replace("Trunk", parent.window.trunk_info.opt_trunk))) + "</span></td>" +
                            "<td><span class='NORMAL'>" + port_pri[j] + "</span></td>" +
                            "<td><span class='NORMAL'>" + port_cost[j] + "</span></td>" +
                            "<td><span class='NORMAL'>" + s_info.disable + "</span></td>" +
                            "<td width='20%'><span class='NORMAL'>" + s_info.disable + "</span></td>" +
                            "</tr>";
                    }
                });
            }
        }
    }
}

function get_xml() {
    xmlReq = parent.getXMLObject();
    if (null != xmlReq) {
        xmlReq.onreadystatechange = state_change;
        xmlReq.open("GET", "/stpInstanceCost.xml", true);
        xmlReq.send(null);
    }
}

window.onload = () => {
    initPageLang();
    initPage();
    initPsTbl();
    initInsPsTbl();

    let psl = $("portSel");
    let opts = "";
    g_plist.forEach((e, i) => {
        opts += (
            '<option id="stpPort_' + i + '" value="' + e + '">' +
                ((i.indexOf("Trunk") < 0)
                    ? (s_info.port + i)
                    : (i.replace("Trunk", parent.window.trunk_info.opt_trunk))
                ) +
            "</option>"
        );
    });
    psl.innerHTML = opts;

    let sel_ins = $("sel_ins");
    let opts2 = "";
    local_instance.forEach((e, i) => {
        opts2 += (
            '<option value="' + local_instance[i] + '">' +
                (s_info.tb_instance + local_instance[i]) +
            "</option>"
        );
    });
    sel_ins.innerHTML = opts2;
    $("stp_region_name").onblur = () => { return chkRegionName(); };
    $("stp_revision").onkeyup = () => {
        let e = $("stp_revision");
        let v = e.value;
        e.value = v.replace(/[^0-9]/g,'');
    };
    $("stp_revision").onblur = () => { return chkRevision(); };
    $("submitBtn1").onclick = () => { return do_submit1(); };
    $("stp_ins").onkeyup = () => {
        let e = $("stp_ins");
        let v = e.value;
        e.value = v.replace(/[^0-9]/g,'');
    };
    $("stp_ins").onblur = () => { return chkInstance(); };
    $("stp_priority").onkeyup = () => {
        let e = $("stp_priority");
        let v = e.value;
        e.value = v.replace(/[^0-9]/g,'');
    };
    $("stp_priority").onblur = () => { return chkPriority(); };
    $("stp_vlan_id").onblur = () => { return chkVlanId(); };
    $("addBtn1").onclick = () => { return do_add1(); };
    $("sel_ins").onchange = () => { return initInsPsTbl(); };
    $("portSel").onclick = (event) => { return chkSel(event); };
    $("submitBtn2").onclick = () => { return do_submit3(); };
    $("delBtn").onclick = () => { return delInstance(); };
    $("applyBtn").onclick = () => { return do_submit2(); };

    local_instance.forEach((e, k) => {
        $("ins_" + k).onclick = () => { return modifyselectedbit(); };
    });
};
incMeta();
</script>
</head>
